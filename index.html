function rAnalytics(){const el=document.getElementById('b-analytics');if(!el)return;el.innerHTML=`<div class="an-g"><div class="an-c"><h4>Focus</h4><div class="an-b">${S.pomoTotalMin}m</div><div style="font-size:10px;color:var(--tx4)">${S.pomoSessions} sessions</div></div><div class="an-c"><h4>Done</h4><div class="an-b">${S.tasksDone||0}</div></div><div class="an-c"><h4>Cards</h4><div class="an-b">${S.flashcards.length}</div></div><div class="an-c"><h4>Notes</h4><div class="an-b">${S.notes.length}</div></div><div class="an-c" style="grid-column:1/-1"><h4>Heatmap (4 weeks)</h4><div class="hm">${S.heatmap.map(v=>`<div class="hm-c ${v>0?'l'+Math.min(v,4):''}"></div>`).join('')}</div></div></div>`}

// --- SCRATCHPAD ---
function rScratch(){const el=document.getElementById('b-scratchpad');if(!el)return;el.innerHTML=`<textarea class="inp" style="height:100%;resize:none;line-height:1.6;font-size:13px" placeholder="scratchpad..." oninput="S.scratchpad=this.value;save()">${esc(S.scratchpad||'')}</textarea>`}

// --- VAULT (with PDF pop-out) ---
function rVault(){const el=document.getElementById('b-vault');if(!el)return;const icons={'text/':'📄','application/json':'📋','application/pdf':'📑','image/':'🖼','default':'📁'};function gi(t){for(const[k,v]of Object.entries(icons))if(t?.startsWith(k))return v;return icons.default}
el.innerHTML='<button class="v-drop" onclick="document.getElementById(\'vaultFileIn\').click()">📂 Click to upload files</button>';if(S.vault.length){el.innerHTML+='<div class="sl">'+S.vault.length+' file'+(S.vault.length===1?'':'s')+'</div>';S.vault.forEach(function(f,i){el.innerHTML+='<button class="v-item" onclick="openVF('+i+')"><span style="font-size:16px">'+gi(f.type)+'</span><div style="flex:1;min-width:0"><div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(f.name)+'</div><div style="font-size:10px;color:var(--tx4)">'+(f.size/1024).toFixed(1)+'KB</div></div><span class="v-del" onclick="event.stopPropagation();S.vault.splice('+i+',1);save();rVault()">✕</span></button>'})}else{el.innerHTML+='<div style="color:var(--tx4);font-size:12px;text-align:center;padding:20px">empty vault</div>'}}
function openVF(i){var f=S.vault[i];if(!f)return;if(f.type==='application/pdf'||f.type?.startsWith('image')){pdfC++;var wid='pdf_'+pdfC;W[wid]={l:f.name.length>20?f.name.substring(0,18)+'…':f.name,o:true,x:100+(pdfC*30),y:80+(pdfC*30),w:f.type==='application/pdf'?700:500,h:f.type==='application/pdf'?600:500,r:function(){var el=document.getElementById('b-'+wid);if(!el)return;if(f.type==='application/pdf'){el.innerHTML='<iframe class="pdf-v" src="'+f.data+'"></iframe>'}else{el.innerHTML='<img src="'+f.data+'" style="max-width:100%;max-height:100%;display:block;margin:0 auto;border-radius:5px">'}}};spawnW(wid)}else{S.notes.unshift({id:Date.now(),title:'📄 '+f.name,body:f.data,updated:Date.now()});S.curNote=0;save();oW('notes')}}

// --- EXPORT DECK ---
function exportDeck(){
const cards=S.fcDeck==='all'?S.flashcards:S.flashcards.filter(c=>c.deck===S.fcDeck);
const name=S.fcDeck==='all'?'all-cards':S.fcDeck;
const blob=new Blob([JSON.stringify(cards.map(c=>({q:c.q,a:c.a,deck:c.deck})),null,2)],{type:'application/json'});
const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='nept-deck-'+name.replace(/\s+/g,'-')+'.json';a.click()}

// --- ICS FILE IMPORT ---
function handleICSFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{parseICS(ev.target.result);rCal()};r.readAsText(f);e.target.value=''}

// --- BROWSER (mini Google inside a floating window) ---
let browserUrl='https://www.google.com/webhp?igu=1';
function rBrowser(){const el=document.getElementById('b-browser');if(!el)return;
el.innerHTML=`<div style="display:flex;gap:4px;margin-bottom:6px"><input class="inp" id="brUrl" value="${esc(browserUrl)}" placeholder="https://..." style="flex:1;font-size:12px" onkeydown="if(event.key==='Enter')navBrowser()"><button class="btn btn-a btn-s" onclick="navBrowser()">Go</button><button class="btn btn-s" onclick="browserUrl='https://www.google.com/webhp?igu=1';rBrowser()">🏠</button></div><iframe id="brFrame" src="${browserUrl}" style="width:100%;height:calc(100% - 36px);border:1px solid var(--brd);border-radius:5px;background:#fff" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>`}
function navBrowser(){let url=document.getElementById('brUrl')?.value.trim();if(!url)return;if(!url.startsWith('http'))url='https://'+url;browserUrl=url;rBrowser()}

// --- SETTINGS ---
function rSettings(){const el=document.getElementById('b-settings');if(!el)return;el.innerHTML=`<div class="sl">Main Theme</div><div class="th-g">${Object.entries(TH).map(([k,t])=>`<button class="th-c ${S.theme===k?'act':''}" onclick="applyTheme('${k}');rSettings()"><div style="display:flex;gap:2px;justify-content:center;margin-bottom:3px"><div style="width:12px;height:12px;border-radius:3px;background:${t.a}"></div></div>${t.n}</button>`).join('')}</div>
<div class="sl">Mode</div><div style="display:flex;gap:4px;margin-bottom:8px"><button class="btn ${S.mode==='dark'?'btn-a':''}" onclick="S.mode='dark';save();applyTheme(S.theme);rSettings()">🌙 Dark</button><button class="btn ${S.mode==='light'?'btn-a':''}" onclick="S.mode='light';save();applyTheme(S.theme);rSettings()">☀ Light</button></div>
<div class="sl">UI Scale</div><div class="sc"><label>Zoom</label><input type="range" min="50" max="400" value="${S.uiScale||100}" oninput="S.uiScale=parseInt(this.value);document.documentElement.style.fontSize=this.value+'%';this.nextElementSibling.textContent=this.value+'%';save()"><span class="sv">${S.uiScale||100}%</span></div>
<div class="sl">Font Size</div><div class="sc"><label>Base Size</label><input type="range" min="10" max="28" value="${S.fontSize||16}" oninput="S.fontSize=parseInt(this.value);document.body.style.fontSize=this.value+'px';this.nextElementSibling.textContent=this.value+'px';save()"><span class="sv">${S.fontSize||16}px</span></div>
<div class="sl">Menu Text Style</div><div style="display:flex;gap:4px;margin-bottom:8px"><button class="btn btn-s ${S.menuStyle==='lower'?'btn-a':''}" onclick="S.menuStyle='lower';save();updateMenuStyle()">lowercase</button><button class="btn btn-s ${S.menuStyle==='upper'?'btn-a':''}" onclick="S.menuStyle='upper';save();updateMenuStyle()">UPPERCASE</button><button class="btn btn-s ${S.menuStyle==='title'?'btn-a':''}" onclick="S.menuStyle='title';save();updateMenuStyle()">Title Case</button></div>
<div class="sl">Transparency</div><div class="sc"><label>Windows</label><input type="range" min="30" max="100" value="${S.winAlpha||90}" oninput="S.winAlpha=parseInt(this.value);this.nextElementSibling.textContent=this.value+'%';save();applyTheme(S.theme)"><span class="sv">${S.winAlpha||90}%</span></div>
<div class="sl">Colors</div>${[{k:'accent',l:'Accent'},{k:'accentText',l:'Accent Text'},{k:'mainText',l:'Main Text'},{k:'background',l:'Background'},{k:'titlebar',l:'Title Bar'},{k:'termPrompt',l:'Terminal Prompt'},{k:'highlight',l:'Highlight / Selection'}].map(({k,l})=>`<div class="cc"><label>${l}</label><input type="color" value="${(S.colors?.[k]||'#87FF65').replace(/[0-9a-f]{2}$/i,'')}" onchange="S.colors.${k}=this.value+(k==='highlight'?'30':'');save();applyTheme('custom');rSettings()"></div>`).join('')}
<button class="btn btn-s" style="margin-bottom:8px" onclick="const t=TH[S.theme]||TH.matrix;S.colors={accent:t.a,accentText:t.a,mainText:S.mode==='dark'?'#e8e8e8':'#1a1a1a',background:S.mode==='dark'?'#0a0a0a':'#f4f4f2',titlebar:S.mode==='dark'?'#171717':'#e1e1df',termPrompt:t.a};save();applyTheme(S.theme);rSettings()">Reset to Defaults</button>
<div class="sl">Background</div><button class="v-drop" style="margin-bottom:4px" onclick="document.getElementById('bgFileIn').click()">${S.bgImage?'✓ Set — click to change':'Upload image (PNG/JPG/WebP)'}</button><div style="font-size:10px;color:var(--tx4);margin-bottom:4px">Max 8MB. Static images only.</div>${S.bgImage?`<button class="btn btn-d btn-s" onclick="S.bgImage=null;save();applyTheme(S.theme);rSettings()">Remove</button>`:''}
<div class="sl" style="margin-top:8px">Profile</div><div style="font-size:14px;margin-bottom:6px">Signed in as <span style="color:var(--accent);font-weight:700">${CU}</span></div>
<div style="display:flex;gap:4px;flex-wrap:wrap"><button class="btn btn-d" onclick="if(confirm('Delete profile?')){idbDel('profiles',CU);signOut()}">Delete</button><button class="btn" onclick="signOut()">Sign Out</button><button class="btn" onclick="const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='nept-'+CU+'.json';a.click()">Export</button></div>`}

// --- QUICK CAPTURE ---
let capT='task';function openCap(){document.getElementById('capOv').style.display='flex';document.getElementById('capIn').value='';document.getElementById('capIn').focus()}
function closeCap(){document.getElementById('capOv').style.display='none'}
function setCapT(t,b){capT=t;document.querySelectorAll('.cap-t').forEach(x=>x.classList.remove('act'));b.classList.add('act')}
function submitCap(){const v=document.getElementById('capIn').value.trim();if(!v)return;if(capT==='task'){S.tasks.unshift({id:Date.now(),text:v,done:false,pri:'med',q:2,subtasks:[],due:null,estimate:null});rr('tasks','matrix','calendar')}else if(capT==='note'){S.notes.unshift({id:Date.now(),title:v,body:'',updated:Date.now()});S.curNote=0;rr('notes')}else if(capT==='kanban'){S.kanban.todo.push({id:Date.now(),title:v});rr('kanban')}else if(capT==='card'){S.flashcards.push({id:Date.now(),q:v,a:'(edit)',deck:S.fcDeck!=='all'?S.fcDeck:'General',ease:2.5,interval:1,due:Date.now()});rr('flashcards')}save();closeCap()}

// --- FOCUS MODE ---
let focusMode=false;function toggleFocus(){focusMode=!focusMode;document.getElementById('fBtn').style.color=focusMode?'var(--accent)':'';updateDim()}
function updateDim(){document.querySelectorAll('.fw').forEach(w=>{w.classList.toggle('dim',focusMode&&!w.classList.contains('foc'))})}

// --- HELP ---
function toggleHelp(){const el=document.getElementById('helpOv');el.style.display=el.style.display==='flex'?'none':'flex';if(el.style.display==='flex')renderHelp()}
function renderHelp(){document.getElementById('helpC').innerHTML=`<div class="kb-r"><span class="kb-d">Quick capture</span><span class="kb-k">Ctrl+Space</span></div><div class="kb-r"><span class="kb-d">Focus mode</span><span class="kb-k">Ctrl+F</span></div><div class="kb-r"><span class="kb-d">Help</span><span class="kb-k">?</span></div><div class="kb-r"><span class="kb-d">Close overlay</span><span class="kb-k">Esc</span></div><div style="margin-top:10px"><div class="ov-t" style="font-size:13px">Terminal</div><div class="kb-r"><span class="kb-d">Task</span><span class="kb-k">set task [pri] "text"</span></div><div class="kb-r"><span class="kb-d">Manage</span><span class="kb-k">ls tasks · done # · rm task #</span></div><div class="kb-r"><span class="kb-d">Card</span><span class="kb-k">set card "q" "a" ["deck"]</span></div><div class="kb-r"><span class="kb-d">Study</span><span class="kb-k">study · import cards</span></div><div class="kb-r"><span class="kb-d">Note/Kanban</span><span class="kb-k">set note "t" · set kanban [col] "t"</span></div><div class="kb-r"><span class="kb-d">Pomo</span><span class="kb-k">pomo start|stop|reset|set #</span></div><div class="kb-r"><span class="kb-d">Window</span><span class="kb-k">open|close [name]</span></div><div class="kb-r"><span class="kb-d">Theme</span><span class="kb-k">theme [name] · light · dark</span></div><div class="kb-r"><span class="kb-d">System</span><span class="kb-k">neofetch · clear</span></div></div>`}

// --- MENU STYLE ---
function updateMenuStyle(){
  /* Applies the user's choice of lowercase/UPPERCASE/Title Case to dropdown buttons */
  const btns=document.querySelectorAll('.dd-b');
  btns.forEach(b=>{
    const raw=b.textContent.replace(/[▾\s]+$/,'').trim();
    if(S.menuStyle==='upper')b.childNodes[0].textContent=raw.toUpperCase()+' ';
    else if(S.menuStyle==='title')b.childNodes[0].textContent=raw.charAt(0).toUpperCase()+raw.slice(1).toLowerCase()+' ';
    else b.childNodes[0].textContent=raw.toLowerCase()+' '
  });
}

// --- KEYS ---
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.code==='Space'){e.preventDefault();openCap()}if((e.ctrlKey||e.metaKey)&&e.key==='f'&&!e.target.closest('input,textarea,[contenteditable]')){e.preventDefault();toggleFocus()}if(e.key==='Escape'){closeCap();document.getElementById('helpOv').style.display='none';cDD()}if(e.key==='?'&&!e.target.closest('input,textarea,[contenteditable]')){e.preventDefault();toggleHelp()}});

// --- INIT ---
function initApp(){pomo.timeLeft=S.pomoTimes.focus*60;applyTheme(S.theme||'matrix');if(S.fontSize)document.body.style.fontSize=S.fontSize+'px';document.getElementById('tbU').innerHTML=`<span class="tb-av">${CU[0].toUpperCase()}</span>${CU}`;document.getElementById('tbW').innerHTML=rg(CU);Object.entries(W).forEach(([k,v])=>{if(v.o)spawnW(k)});focW('terminal');checkAlerts();setTimeout(updateMenuStyle,100)}
</script>
