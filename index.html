<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEPT</title>
<!-- VT323: retro pixel font with full lowercase + symbol support -->
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ============================================================
   NEPT — a personal productivity workspace
   Everything (colors, text, glows) derives from CSS variables
   so themes can be swapped at runtime. The light mode palette
   lives under [data-mode="light"] below.
   ============================================================ */
:root{
  /* Neutral grays — no color tint so themes read clean */
  --g0:#0a0a0a; --g1:#101010; --g2:#161616; --g3:#1c1c1c; --g4:#242424;
  /* Accent: the one customizable brand color. Border/glow alphas
     are derived from this dynamically in applyTheme() */
  --accent:#87FF65;
  --accent-text:#87FF65;   /* controls tinted text (prompts, highlights) */
  --titlebar:#161616;       /* window title bar background */
  --term-prompt:#87FF65;    /* terminal prompt char color */
  /* Status colors stay constant across themes */
  --red:#ff5c5c; --yellow:#ffc857; --blue:#65b8ff; --purple:#c87fff;
  /* Text hierarchy */
  --tx1:#e8e8e8; --tx2:#999999; --tx3:#666666; --tx4:#444444;
  /* Borders auto-generated from accent */
  --brd:rgba(255,255,255,0.05);
  --brd2:rgba(255,255,255,0.12);
  --brdA:rgba(255,255,255,0.2);
  --glass:rgba(14,14,14,0.9);
  --winAlpha:0.9;
  /* Fonts — VT323 is the pixel body font, the others are fallbacks */
  --fm:'VT323','Share Tech Mono',monospace;
  --fd:'Exo 2',sans-serif;
  --fmono:'Share Tech Mono',monospace;
  /* Layout tokens */
  --bar:32px; --r:8px; --rs:5px;
}
[data-mode="light"]{
  --g0:#f5f5f3; --g1:#ececea; --g2:#e2e2e0; --g3:#d8d8d6; --g4:#cccccc;
  --tx1:#1a1a1a; --tx2:#555555; --tx3:#888888; --tx4:#aaaaaa;
  --brd:rgba(0,0,0,0.06); --brd2:rgba(0,0,0,0.12); --brdA:rgba(0,0,0,0.2);
  --glass:rgba(245,245,243,0.85);
  --red:#d94040; --yellow:#c89e30; --blue:#3a8ad4; --purple:#9050d0;
}
/* ── reset & base ── */
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--fm);
  background:var(--g0);
  color:var(--tx1);
  font-size:16px;  /* VT323 is small, needs bigger base */
  transition:background 0.4s,color 0.4s;
  line-height:1.3;
}
body.has-bg{background-size:cover;background-position:center;background-attachment:fixed}
/* slim green-accented scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:4px}
::selection{background:rgba(135,255,101,0.2)}
/* matrix rain lives behind everything */
canvas#matrix{position:fixed;inset:0;z-index:0;opacity:0.05;transition:opacity 0.4s}
[data-mode="light"] canvas#matrix{opacity:0.03}

/* ============================================================
   TASKBAR — the top strip with logo, greeting, dropdowns, clock
   ============================================================ */
.taskbar{
  height:var(--bar);
  display:flex;align-items:center;
  padding:0 10px;
  background:var(--glass);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--brd);
  z-index:200;position:relative;
}
.tb-logo{
  display:flex;align-items:center;gap:6px;
  padding-right:14px;
  border-right:1px solid var(--brd);
  margin-right:8px;
}
.tb-g{
  width:18px;height:18px;
  background:var(--accent);
  border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fd);font-weight:900;font-size:11px;
  color:var(--g0);
}
.tb-n{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:4px;font-family:var(--fm)}
.tb-welcome{
  font-size:13px;color:var(--tx2);
  padding:0 14px;border-right:1px solid var(--brd);margin-right:4px;
  white-space:nowrap;max-width:280px;overflow:hidden;text-overflow:ellipsis;
}
.tb-welcome b{color:var(--accent-text);font-weight:400}

/* Dropdown menus — the grouped nav */
.dd-wrap{position:relative}
.dd-btn{
  padding:4px 10px;font-size:13px;
  color:var(--tx3);background:none;border:none;
  font-family:var(--fm);cursor:pointer;
  border-radius:3px;display:flex;align-items:center;gap:4px;
  transition:all 0.12s;
}
.dd-btn:hover,.dd-btn.open{color:var(--tx1);background:var(--brd)}
.dd-btn .dd-arrow{font-size:8px;transition:transform 0.2s}
.dd-btn.open .dd-arrow{transform:rotate(180deg)}
.dd-menu{
  position:absolute;top:calc(100% + 4px);left:0;
  min-width:170px;
  background:var(--glass);backdrop-filter:blur(20px);
  border:1px solid var(--brd2);border-radius:var(--r);
  padding:4px;
  box-shadow:0 8px 30px rgba(0,0,0,0.3);
  z-index:300;display:none;
  animation:ddIn 0.25s cubic-bezier(0.16,1,0.3,1);
}
.dd-menu.show{display:block}
@keyframes ddIn{from{opacity:0;transform:translateY(-6px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.dd-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 10px;border-radius:var(--rs);
  cursor:pointer;font-size:13px;
  color:var(--tx2);transition:all 0.12s;
}
.dd-item:hover{background:var(--brd);color:var(--tx1)}
.dd-ico{width:16px;text-align:center;font-size:13px}
.dd-sep{height:1px;background:var(--brd);margin:3px 6px}

.tb-right{display:flex;align-items:center;gap:4px;margin-left:auto}
.tb-clk{color:var(--tx3);font-size:13px;padding:0 8px;letter-spacing:1px;font-family:var(--fmono)}
.tb-a{
  width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;
  border-radius:4px;cursor:pointer;
  color:var(--tx3);font-size:12px;
  background:none;border:none;transition:all 0.12s;
}
.tb-a:hover{color:var(--accent);background:var(--brd)}
.tb-user{
  display:flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:14px;
  background:var(--brd);border:1px solid var(--brd);
  font-size:12px;color:var(--tx2);cursor:pointer;margin-left:4px;
}
.tb-user:hover{border-color:var(--brd2)}
.tb-uav{
  width:18px;height:18px;border-radius:50%;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:var(--g0);
}
.help-float{
  position:fixed;top:var(--bar);right:0;z-index:190;
  width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;
  background:var(--brd);border:1px solid var(--brd);
  border-radius:0 0 0 var(--rs);
  cursor:pointer;color:var(--accent);
  font-size:14px;font-weight:700;
}

/* ============================================================
   WORKSPACE — the big area where floating windows live
   ============================================================ */
.workspace{position:relative;width:100%;height:calc(100vh - var(--bar));overflow:hidden;z-index:1}
.app-wrap{display:none;flex-direction:column;height:100%}
.app-wrap.show{display:flex}

/* Floating window — Hyprland-inspired smooth spawn/despawn */
.fw{
  position:absolute;display:flex;flex-direction:column;
  min-width:280px;min-height:180px;
  border:1px solid var(--brd);border-radius:var(--r);
  box-shadow:0 6px 30px rgba(0,0,0,0.35);
  overflow:visible;backdrop-filter:blur(14px);
  transition:box-shadow 0.25s cubic-bezier(0.16,1,0.3,1),
             border-color 0.25s,
             opacity 0.35s,
             transform 0.35s cubic-bezier(0.16,1,0.3,1);
  z-index:10;
}
.fw.spawning{animation:spawn 0.4s cubic-bezier(0.16,1,0.3,1) forwards}
@keyframes spawn{from{opacity:0;transform:scale(0.92) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.fw.despawning{animation:despawn 0.3s ease forwards}
@keyframes despawn{to{opacity:0;transform:scale(0.92) translateY(8px)}}
.fw.focused{z-index:50;border-color:var(--brd2);box-shadow:0 10px 40px rgba(0,0,0,0.45)}
.fw.dimmed{opacity:0.12;pointer-events:none;filter:blur(1.5px)}
.fw.snapping{transition:left 0.3s cubic-bezier(0.16,1,0.3,1),top 0.3s cubic-bezier(0.16,1,0.3,1),width 0.3s cubic-bezier(0.16,1,0.3,1),height 0.3s cubic-bezier(0.16,1,0.3,1)}
.fw-tb{
  height:28px;min-height:28px;
  display:flex;align-items:center;padding:0 10px;
  cursor:grab;user-select:none;
  border-bottom:1px solid var(--brd);
  background:var(--titlebar);
  gap:6px;border-radius:var(--r) var(--r) 0 0;
}
.fw-tb:active{cursor:grabbing}
.fw-dots{display:flex;gap:5px}
.fw-d{width:10px;height:10px;border-radius:50%;cursor:pointer;border:none;transition:all 0.1s}
.d-r{background:var(--red)}.d-y{background:var(--yellow)}.d-g{background:var(--accent)}
.fw-title{
  font-size:12px;letter-spacing:2px;text-transform:uppercase;
  color:var(--tx4);flex:1;text-align:center;pointer-events:none;
}
.fw-body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.fw-inner{flex:1;overflow-y:auto;padding:10px;position:relative}

/* Resize handles on every edge and corner */
.rh{position:absolute;z-index:2}
.rh-n{top:-4px;left:10px;right:10px;height:8px;cursor:n-resize}
.rh-s{bottom:-4px;left:10px;right:10px;height:8px;cursor:s-resize}
.rh-w{left:-4px;top:10px;bottom:10px;width:8px;cursor:w-resize}
.rh-e{right:-4px;top:10px;bottom:10px;width:8px;cursor:e-resize}
.rh-nw{top:-4px;left:-4px;width:14px;height:14px;cursor:nw-resize}
.rh-ne{top:-4px;right:-4px;width:14px;height:14px;cursor:ne-resize}
.rh-sw{bottom:-4px;left:-4px;width:14px;height:14px;cursor:sw-resize}
.rh-se{bottom:-4px;right:-4px;width:14px;height:14px;cursor:se-resize}
.snap-guide{
  position:absolute;background:var(--brd);
  border:1px dashed var(--brd2);z-index:999;pointer-events:none;
  border-radius:var(--rs);display:none;
}

/* ============================================================
   SHARED UI primitives — buttons, inputs, labels, etc.
   ============================================================ */
.sl{
  font-size:11px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--tx4);margin:8px 0 6px;
  display:flex;align-items:center;gap:6px;
}
.sl::after{content:'';flex:1;height:1px;background:var(--brd)}
.btn{
  padding:5px 12px;border-radius:4px;
  border:1px solid var(--brd);background:var(--g3);
  color:var(--tx2);font-family:var(--fm);font-size:12px;
  cursor:pointer;transition:all 0.15s;
}
.btn:hover{border-color:var(--brd2);color:var(--tx1)}
.btn-g{background:var(--brd);border-color:var(--brdA);color:var(--accent)}
.btn-g:hover{background:var(--brd2)}
.btn-s{padding:3px 8px;font-size:11px}
.btn-d{border-color:rgba(255,92,92,0.3);color:var(--red)}
.btn-d:hover{background:rgba(255,92,92,0.1)}
.input{
  width:100%;padding:6px 8px;
  background:var(--g2);border:1px solid var(--brd);
  border-radius:4px;color:var(--tx1);
  font-family:var(--fm);font-size:13px;outline:none;
  transition:border-color 0.15s;
}
.input:focus{border-color:var(--brdA)}
.input::placeholder{color:var(--tx4)}
.badge{font-size:10px;padding:1px 6px;border-radius:8px;font-family:var(--fm)}
.b-hi{background:rgba(255,92,92,.1);color:var(--red)}
.b-md{background:rgba(255,200,87,.08);color:var(--yellow)}
.b-lo{background:var(--brd);color:var(--accent)}

/* Tabs — used in Settings, Flashcards */
.tab-bar{display:flex;gap:1px;background:var(--g2);border-radius:4px;padding:2px;margin-bottom:8px}
.tab{
  flex:1;padding:5px 8px;text-align:center;
  font-size:11px;cursor:pointer;border-radius:3px;
  color:var(--tx3);transition:all 0.2s;
  border:none;background:none;font-family:var(--fm);
}
.tab.act{background:var(--brd);color:var(--accent)}
.tab-content{display:none}
.tab-content.act{display:block;animation:tabF 0.3s cubic-bezier(0.16,1,0.3,1)}
@keyframes tabF{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ============================================================
   TERMINAL — the main command interface
   ============================================================ */
.t-out{
  white-space:pre-wrap;word-break:break-all;
  line-height:1.5;color:var(--tx2);
  font-family:var(--fmono);font-size:14px;
}
.t-out .c{color:var(--accent-text)}
.t-out .e{color:var(--red)}
.t-out .i{color:var(--blue)}
.t-out .w{color:var(--yellow)}
.t-out .s{color:var(--accent)}
.t-out .d{color:var(--tx4)}
.t-out .a{color:var(--accent);font-weight:600}
.t-p{display:flex;align-items:center;margin-top:4px;font-family:var(--fmono)}
.t-ps{color:var(--term-prompt);white-space:nowrap;font-size:14px}
.t-in{
  flex:1;background:none;border:none;outline:none;
  color:var(--tx1);font-family:var(--fmono);font-size:14px;
  caret-color:var(--accent);
}

/* ============================================================
   TASKS — simple checkable list with priority badges
   ============================================================ */
.ti{
  display:flex;align-items:center;gap:8px;
  padding:6px 8px;background:var(--g2);
  border-radius:4px;margin-bottom:3px;
  border:1px solid transparent;transition:all 0.1s;
}
.ti:hover{border-color:var(--brd)}
.tc{
  width:14px;height:14px;min-width:14px;
  border-radius:50%;border:1.5px solid var(--tx4);
  cursor:pointer;transition:all 0.15s;
}
.tc:hover{border-color:var(--accent)}
.tc.dn{background:var(--accent);border-color:var(--accent)}
.tt{flex:1;font-size:14px}
.tt.dn{text-decoration:line-through;color:var(--tx4)}

/* ============================================================
   KANBAN — columns with draggable cards
   ============================================================ */
.kb-c{display:flex;gap:6px;height:100%;overflow-x:auto}
.kb-co{
  min-width:160px;flex:1;
  background:var(--g2);border-radius:var(--rs);
  padding:8px;display:flex;flex-direction:column;
  border:1px solid var(--brd);
}
.kb-h{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:6px;padding-bottom:4px;
  border-bottom:1px solid var(--brd);
}
.kb-n{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx4)}
.kb-ct{
  background:var(--brd);color:var(--accent);
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:10px;
}
.kb-cs{flex:1;display:flex;flex-direction:column;gap:3px;overflow-y:auto}
.kb-cd{
  background:var(--g1);border:1px solid var(--brd);
  border-radius:4px;padding:6px 8px;
  cursor:grab;transition:all 0.15s;font-size:13px;
}
.kb-cd:hover{border-color:var(--brd2);transform:translateY(-1px)}

/* ============================================================
   NOTES — sidebar list + editor
   ============================================================ */
.nl{display:flex;flex-direction:column;gap:2px;max-height:140px;overflow-y:auto;margin-bottom:6px}
.ni{
  padding:4px 8px;border-radius:3px;
  cursor:pointer;font-size:12px;color:var(--tx2);
  transition:all 0.12s;
}
.ni:hover{background:var(--brd)}
.ni.act{background:var(--brd);color:var(--accent)}

/* ============================================================
   PLANNER — hourly time blocks that glow when filled
   ============================================================ */
.pl-r{display:flex;gap:6px;margin-bottom:2px}
.pl-t{
  width:50px;font-size:12px;color:var(--tx4);
  padding-top:4px;text-align:right;flex-shrink:0;
  font-family:var(--fmono);
}
.pl-s{
  flex:1;padding:4px 8px;
  background:var(--g2);border-radius:3px;
  border:1px solid transparent;font-size:13px;
  min-height:26px;color:var(--tx2);
  transition:all 0.12s;outline:none;
}
.pl-s:focus{border-color:var(--brdA)}
.pl-s.filled{
  border-left:2px solid var(--accent);
  color:var(--accent);background:var(--brd);
}

/* ============================================================
   FLASHCARDS — SM-2 spaced repetition, click to flip
   ============================================================ */
.fc-card{perspective:800px;width:100%;height:150px;cursor:pointer;margin-bottom:8px}
.fc-inner{
  position:relative;width:100%;height:100%;
  transition:transform 0.5s cubic-bezier(0.16,1,0.3,1);
  transform-style:preserve-3d;
}
.fc-card.flipped .fc-inner{transform:rotateY(180deg)}
.fc-face{
  position:absolute;inset:0;backface-visibility:hidden;
  display:flex;align-items:center;justify-content:center;
  padding:16px;border-radius:var(--r);
  font-size:15px;text-align:center;line-height:1.5;
}
.fc-front{background:var(--g3);border:1px solid var(--brd);color:var(--tx1)}
.fc-back{background:var(--brd);border:1px solid var(--brd2);color:var(--accent);transform:rotateY(180deg)}
.fc-fl{
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--tx4);position:absolute;top:8px;left:12px;
}
.fc-rate{display:flex;justify-content:center;gap:6px;margin-top:6px}
.fc-rb{
  padding:5px 14px;border-radius:4px;border:none;
  font-family:var(--fm);font-size:11px;
  cursor:pointer;transition:all 0.15s;
}
.fc-ra{background:rgba(255,92,92,0.08);color:var(--red);border:1px solid rgba(255,92,92,0.15)}
.fc-rh{background:rgba(255,200,87,0.08);color:var(--yellow);border:1px solid rgba(255,200,87,0.15)}
.fc-rg{background:var(--brd);color:var(--accent);border:1px solid var(--brdA)}
.fc-re{background:rgba(101,184,255,0.08);color:var(--blue);border:1px solid rgba(101,184,255,0.15)}
.fc-list{display:flex;flex-direction:column;gap:3px;max-height:140px;overflow-y:auto}
.fc-li{display:flex;align-items:center;padding:4px 8px;background:var(--g2);border-radius:3px;font-size:12px;color:var(--tx2)}
.fc-li span:first-child{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fc-del{color:var(--red);cursor:pointer;font-size:12px;margin-left:6px}

/* ============================================================
   EISENHOWER MATRIX — 2x2 grid of task quadrants
   ============================================================ */
.mx-g{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:4px;height:100%}
.mx-q{
  background:var(--g2);border-radius:var(--rs);padding:8px;
  display:flex;flex-direction:column;
  border:1px solid var(--brd);overflow-y:auto;
}
.mx-ql{
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  margin-bottom:6px;display:flex;align-items:center;gap:4px;
}
.mx-dt{width:5px;height:5px;border-radius:2px}
.q1 .mx-dt{background:var(--red)}.q1 .mx-ql{color:var(--red)}
.q2 .mx-dt{background:var(--yellow)}.q2 .mx-ql{color:var(--yellow)}
.q3 .mx-dt{background:var(--blue)}.q3 .mx-ql{color:var(--blue)}
.q4 .mx-dt{background:var(--tx4)}.q4 .mx-ql{color:var(--tx4)}
.mx-i{
  font-size:12px;padding:4px 6px;
  background:var(--g1);border-radius:3px;
  margin-bottom:3px;cursor:pointer;
  border:1px solid transparent;
}
.mx-i:hover{border-color:var(--brd2)}

/* ============================================================
   ANALYTICS — stat cards + 4-week heatmap
   ============================================================ */
.an-g{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.an-c{background:var(--g2);border-radius:var(--rs);padding:10px;border:1px solid var(--brd)}
.an-c h4{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--tx4);margin-bottom:4px}
.an-b{
  font-size:28px;font-weight:800;font-family:var(--fd);
  color:var(--accent);
}
.hm{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.hm-c{aspect-ratio:1;border-radius:2px;background:var(--g1)}
.hm-c.l1{background:var(--brd)}
.hm-c.l2{background:var(--brd2)}
.hm-c.l3{background:var(--brdA)}
.hm-c.l4{background:var(--accent);opacity:0.6}

/* ============================================================
   VAULT — personal file storage
   ============================================================ */
.vault-list{display:flex;flex-direction:column;gap:3px}
.vault-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;background:var(--g2);
  border-radius:var(--rs);border:1px solid transparent;
  transition:all 0.12s;cursor:pointer;font-size:13px;
}
.vault-item:hover{border-color:var(--brd2)}
.vault-del{color:var(--red);cursor:pointer;font-size:12px;opacity:0;transition:opacity 0.12s;margin-left:auto}

<script>
/* ============================================================
   GREETING POOL — randomized welcome in different languages
   ============================================================ */
const GREETS = [
  'Welcome back', 'Salutations', 'Bienvenue', 'Willkommen',
  'Bienvenido', 'Bentornato', 'Välkommen', 'いらっしゃい',
  'Bem-vindo', 'Aloha', 'Hey there', 'Hola', 'Bonjour',
  'こんにちは', 'Hej', 'Olá', 'Merhaba', 'Ahoj'
];
function randomGreeting(name){
  return GREETS[Math.floor(Math.random() * GREETS.length)] + ', <b>' + name + '</b>';
}

/* ============================================================
   PROFILE STORAGE — each user gets their own saved state
   ============================================================ */
function getProfiles(){
  return JSON.parse(localStorage.getItem('nept_profiles') || '{}');
}
function saveProfiles(p){
  localStorage.setItem('nept_profiles', JSON.stringify(p));
}
let CU = null; // current user

function showLogin(){
  document.getElementById('LS').classList.remove('out');
  document.getElementById('app').classList.remove('show');

  // List existing profiles as quick-login buttons
  const profiles = getProfiles();
  const profileList = document.getElementById('lProfiles');
  const names = Object.keys(profiles);
  profileList.innerHTML = names.length
    ? names.map(n => `<button class="login-profile-btn" onclick="quickLogin('${n}')"><div class="login-avatar">${n[0].toUpperCase()}</div>${n}</button>`).join('')
    : '';

  // If "stay signed in" was checked last time, auto-login
  const autoUser = localStorage.getItem('nept_auto');
  if (autoUser && profiles[autoUser]) quickLogin(autoUser);
}

function doLogin(){
  const user = document.getElementById('lU').value.trim();
  const pass = document.getElementById('lP').value;
  if (!user){ document.getElementById('lErr').textContent = 'Enter a username'; return; }
  const profiles = getProfiles();
  if (!profiles[user]){ document.getElementById('lErr').textContent = 'Profile not found. Use Create.'; return; }
  if (profiles[user].pw && profiles[user].pw !== pass){ document.getElementById('lErr').textContent = 'Wrong password'; return; }
  enter(user);
}

function doCreate(){
  const user = document.getElementById('lU').value.trim();
  const pass = document.getElementById('lP').value;
  if (!user){ document.getElementById('lErr').textContent = 'Enter a username'; return; }
  const profiles = getProfiles();
  if (profiles[user]){ document.getElementById('lErr').textContent = 'Already exists.'; return; }
  profiles[user] = { pw: pass, data: null };
  saveProfiles(profiles);
  enter(user);
}

function quickLogin(user){ enter(user); }

function enter(user){
  CU = user;
  const profiles = getProfiles();
  S = profiles[user]?.data || freshState();

  /* ── STATE MIGRATION ──
     Old profiles from earlier versions won't have newer fields.
     We patch them in here so nothing crashes on load. */
  const defaults = freshState();
  if (!S.colors) S.colors = defaults.colors;
  else {
    // Fill in any missing color keys
    for (const k of Object.keys(defaults.colors)){
      if (!S.colors[k]) S.colors[k] = defaults.colors[k];
    }
  }
  if (!S.keybinds) S.keybinds = defaults.keybinds;
  if (!S.vault) S.vault = [];
  if (S.winAlpha === undefined) S.winAlpha = 90;
  if (!S.decks) S.decks = ['General'];
  // Ensure every flashcard has a deck field
  S.flashcards.forEach(c => { if (!c.deck) c.deck = 'General'; });

  // Remember login preference
  if (document.getElementById('lR')?.checked){
    localStorage.setItem('nept_auto', user);
  }
  document.getElementById('LS').classList.add('out');
  setTimeout(() => {
    document.getElementById('app').classList.add('show');
    initApp();
  }, 400);
}

function signOut(){
  saveUserData();
  localStorage.removeItem('nept_auto');
  CU = null;
  document.querySelectorAll('.fw').forEach(e => e.remove());
  showLogin();
}

function saveUserData(){
  if (!CU) return;
  const profiles = getProfiles();
  if (!profiles[CU]) profiles[CU] = { pw: '' };
  profiles[CU].data = S;
  saveProfiles(profiles);
}

/* Fresh state for a brand-new profile */
function freshState(){
  return {
    tasks: [],
    kanban: { backlog: [], todo: [], doing: [], done: [] },
    notes: [],
    curNote: 0,
    planner: {},
    pomoSessions: 0,
    pomoTotalMin: 0,
    tasksDone: 0,
    pomoLog: [],
    pomoTimes: { focus: 25, short: 5, long: 15 },
    heatmap: Array(28).fill(0),
    scratchpad: '',
    flashcards: [],
    decks: ['General'],
    fcIdx: 0,
    fcDeck: 'all',  // which deck is currently being studied
    theme: 'matrix',
    mode: 'dark',
    // Full color customization — each can be overridden per-user
    colors: {
      accent: '#87FF65',       // brand / borders / glows
      accentText: '#87FF65',   // tinted highlights
      mainText: '#e8e8e8',     // body copy
      background: '#0a0a0a',   // panels
      titlebar: '#161616',     // window title bars
      termPrompt: '#87FF65'    // terminal prompt char
    },
    bgImage: null,
    vault: [],
    winAlpha: 90,
    keybinds: {
      capture: 'Ctrl+Space',
      focus: 'Ctrl+F',
      help: '?'
    }
  };
}
let S = freshState();
const save = () => saveUserData();

/* ============================================================
   MATRIX RAIN — canvas-based falling characters in the bg
   Color reads from --accent CSS var so it follows themes
   ============================================================ */
(() => {
  const canvas = document.getElementById('matrix');
  const ctx = canvas.getContext('2d');
  let w, h, cols, drops;

  function resize(){
    w = canvas.width = innerWidth;
    h = canvas.height = innerHeight;
    cols = Math.floor(w / 14);
    drops = Array(cols).fill(1);
  }
  resize();
  addEventListener('resize', resize);

  const chars = '01アイウエオカキク';
  (function draw(){
    // Fade previous frame
    ctx.fillStyle = S?.mode === 'light' ? 'rgba(245,245,243,0.08)' : 'rgba(10,10,10,0.05)';
    ctx.fillRect(0, 0, w, h);
    // Draw new characters in current accent
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#87FF65';
    ctx.font = '12px Share Tech Mono';
    for (let i = 0; i < cols; i++){
      const c = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(c, i * 14, drops[i] * 14);
      if (drops[i] * 14 > h && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
    setTimeout(draw, 50);
  })();
})();

/* ============================================================
   THEMES — preset accent colors. Each one is just a name + accent.
   applyTheme() derives borders and glows from accent dynamically.
   ============================================================ */
const THEMES = {
  matrix: { name: 'Matrix',  accent: '#87FF65' },
  cyber:  { name: 'Cyber',   accent: '#65d4ff' },
  ember:  { name: 'Ember',   accent: '#ff6b4a' },
  vapor:  { name: 'Vapor',   accent: '#c87fff' },
  mono:   { name: 'Mono',    accent: '#aaaaaa' },
  gold:   { name: 'Gold',    accent: '#ffc857' },
  ocean:  { name: 'Ocean',   accent: '#4ac2c8' },
  rose:   { name: 'Rose',    accent: '#ff6b8a' }
};

/**
 * Apply a named theme, or 'custom' to use S.colors directly.
 * This rebuilds all the CSS variables that control visual style.
 */
function applyTheme(name){
  const theme = THEMES[name] || THEMES.matrix;
  document.documentElement.setAttribute('data-mode', S.mode);
  const style = document.documentElement.style;

  // For preset themes, sync the accent into S.colors so the color pickers reflect it
  if (name !== 'custom'){
    S.colors.accent = theme.accent;
    S.colors.accentText = theme.accent;
    S.colors.termPrompt = theme.accent;
  }

  // Set accent + derived border/glow alphas
  const hex = S.colors.accent.replace('#', '');
  const r = parseInt(hex.substr(0,2), 16);
  const g = parseInt(hex.substr(2,2), 16);
  const b = parseInt(hex.substr(4,2), 16);
  style.setProperty('--accent', S.colors.accent);
  style.setProperty('--accent-text', S.colors.accentText);
  style.setProperty('--term-prompt', S.colors.termPrompt);
  style.setProperty('--brd',  `rgba(${r},${g},${b},0.06)`);
  style.setProperty('--brd2', `rgba(${r},${g},${b},0.14)`);
  style.setProperty('--brdA', `rgba(${r},${g},${b},0.25)`);

  // Mode-specific neutral backgrounds and text
  if (S.mode === 'dark'){
    // Allow user override of background color
    const bg = S.colors.background || '#0a0a0a';
    style.setProperty('--g0', bg);
    style.setProperty('--g1', lighten(bg, 4));
    style.setProperty('--g2', lighten(bg, 8));
    style.setProperty('--g3', lighten(bg, 14));
    style.setProperty('--g4', lighten(bg, 20));
    style.setProperty('--tx1', S.colors.mainText || '#e8e8e8');
    // Derive secondary text shades from the main text color
    const txHex = (S.colors.mainText || '#e8e8e8').replace('#','');
    const txR = parseInt(txHex.substr(0,2),16);
    const txG = parseInt(txHex.substr(2,2),16);
    const txB = parseInt(txHex.substr(4,2),16);
    // Fade main text toward background for tx2/tx3/tx4
    style.setProperty('--tx2', `rgb(${Math.round(txR*0.6)},${Math.round(txG*0.6)},${Math.round(txB*0.6)})`);
    style.setProperty('--tx3', `rgb(${Math.round(txR*0.4)},${Math.round(txG*0.4)},${Math.round(txB*0.4)})`);
    style.setProperty('--tx4', `rgb(${Math.round(txR*0.25)},${Math.round(txG*0.25)},${Math.round(txB*0.25)})`);
    style.setProperty('--glass', hexToRgba(bg, 0.9));
    style.setProperty('--titlebar', S.colors.titlebar || lighten(bg, 8));
  } else {
    style.setProperty('--g0', '#f5f5f3');
    style.setProperty('--g1', '#ececea');
    style.setProperty('--g2', '#e2e2e0');
    style.setProperty('--g3', '#d8d8d6');
    style.setProperty('--tx1', S.colors.mainText || '#1a1a1a');
    const ltHex = (S.colors.mainText || '#1a1a1a').replace('#','');
    const ltR = parseInt(ltHex.substr(0,2),16);
    const ltG = parseInt(ltHex.substr(2,2),16);
    const ltB = parseInt(ltHex.substr(4,2),16);
    // Light mode: fade toward white (higher values = lighter)
    const mix = (c, t, amt) => Math.round(c + (t - c) * amt);
    style.setProperty('--tx2', `rgb(${mix(ltR,200,0.5)},${mix(ltG,200,0.5)},${mix(ltB,200,0.5)})`);
    style.setProperty('--tx3', `rgb(${mix(ltR,200,0.7)},${mix(ltG,200,0.7)},${mix(ltB,200,0.7)})`);
    style.setProperty('--tx4', `rgb(${mix(ltR,200,0.85)},${mix(ltG,200,0.85)},${mix(ltB,200,0.85)})`);
    style.setProperty('--glass', 'rgba(245,245,243,0.85)');
    style.setProperty('--titlebar', '#e2e2e0');
  }

  // Background image (only static images — GIFs were causing crashes)
  if (S.bgImage){
    document.body.style.backgroundImage = `url(${S.bgImage})`;
    document.body.classList.add('has-bg');
  } else {
    document.body.style.backgroundImage = 'none';
    document.body.classList.remove('has-bg');
  }

  // Update window transparency
  style.setProperty('--winAlpha', (S.winAlpha / 100).toFixed(2));
  document.querySelectorAll('.fw').forEach(el => {
    el.style.background = S.mode === 'light'
      ? `rgba(236,236,234,${S.winAlpha / 100})`
      : hexToRgba(S.colors.background || '#0a0a0a', S.winAlpha / 100);
  });

  S.theme = name;
  save();
  document.title = `NEPT — ${CU}`;

  // Update mode toggle label in the dropdown
  const mIco = document.getElementById('mIco');
  const mTxt = document.getElementById('mTxt');
  if (mIco) mIco.textContent = S.mode === 'light' ? '🌙' : '☀';
  if (mTxt) mTxt.textContent = S.mode === 'light' ? 'Dark Mode' : 'Light Mode';
}

/* Small color helpers */
function lighten(hex, amt){
  const h = hex.replace('#','');
  const r = Math.min(255, parseInt(h.substr(0,2),16) + amt);
  const g = Math.min(255, parseInt(h.substr(2,2),16) + amt);
  const b = Math.min(255, parseInt(h.substr(4,2),16) + amt);
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}
function hexToRgba(hex, a){
  const h = hex.replace('#','');
  const r = parseInt(h.substr(0,2),16);
  const g = parseInt(h.substr(2,2),16);
  const b = parseInt(h.substr(4,2),16);
  return `rgba(${r},${g},${b},${a})`;
}

function toggleMode(){
  S.mode = S.mode === 'dark' ? 'light' : 'dark';
  save();
  applyTheme(S.theme);
}

  const menu = btn.nextElementSibling;
  const wasOpen = menu.classList.contains('show');

  if (!wasOpen){
    menu.classList.add('show');
    btn.classList.add('open');
  }
}

  document.querySelectorAll('.dd-menu').forEach(m => m.classList.remove('show'));
  document.querySelectorAll('.dd-btn').forEach(b => b.classList.remove('open'));
}

});

let topZ = 50;

/* PDF viewer windows are spawned dynamically — each gets a unique id */
let pdfWinCount = 0;

function openW(id){
  if (!W[id]) return;
  if (!W[id].o){ W[id].o = true; spawnWin(id); }
  focusW(id);
}
function closeW(id){
  if (!W[id]) return;
  W[id].o = false;
  despawnWin(id);
  // Remove dynamic PDF windows entirely
  if (id.startsWith('pdf_')) delete W[id];
}

function spawnWin(id){
  const conf = W[id];
  const ws = document.getElementById('ws');
  const el = document.createElement('div');
  el.className = 'fw spawning';
  el.id = 'fw-' + id;
  const bg = S.mode === 'light'
    ? `rgba(236,236,234,${S.winAlpha / 100})`
    : hexToRgba(S.colors.background || '#0a0a0a', S.winAlpha / 100);
  el.style.cssText = `left:${conf.x}px;top:${conf.y}px;width:${conf.w}px;height:${conf.h}px;background:${bg}`;
  el.innerHTML = `
    <div class="rh rh-n" data-d="n" data-w="${id}"></div>
    <div class="rh rh-s" data-d="s" data-w="${id}"></div>
    <div class="rh rh-w" data-d="w" data-w="${id}"></div>
    <div class="rh rh-e" data-d="e" data-w="${id}"></div>
    <div class="rh rh-nw" data-d="nw" data-w="${id}"></div>
    <div class="rh rh-ne" data-d="ne" data-w="${id}"></div>
    <div class="rh rh-sw" data-d="sw" data-w="${id}"></div>
    <div class="rh rh-se" data-d="se" data-w="${id}"></div>
    <div class="fw-tb" data-wid="${id}">
      <div class="fw-dots">
        <button class="fw-d d-r" onclick="event.stopPropagation();closeW('${id}')"></button>
        <button class="fw-d d-y" onclick="event.stopPropagation();closeW('${id}')"></button>
        <button class="fw-d d-g" onclick="event.stopPropagation();maxW('${id}')"></button>
      </div>
      <span class="fw-title">${conf.l}</span>
    </div>
    <div class="fw-body"><div class="fw-inner" id="b-${id}"></div></div>`;
  ws.appendChild(el);
  setTimeout(() => el.classList.remove('spawning'), 400);
  conf.r();
  focusW(id);
}

function despawnWin(id){
  const el = document.getElementById('fw-' + id);
  if (!el) return;
  el.classList.add('despawning');
  setTimeout(() => el.remove(), 300);
}

/* Maximize / restore a window (triple dot) */
function maxW(id){
  const el = document.getElementById('fw-' + id);
  const ws = document.getElementById('ws');
  if (!el) return;
  if (el.dataset.max === '1'){
    // Restore
    el.classList.add('snapping');
    el.style.left = el.dataset.ol + 'px';
    el.style.top = el.dataset.ot + 'px';
    el.style.width = el.dataset.ow + 'px';
    el.style.height = el.dataset.oh + 'px';
    el.dataset.max = '0';
    setTimeout(() => el.classList.remove('snapping'), 300);
  } else {
    // Save current, maximize
    el.dataset.ol = parseInt(el.style.left);
    el.dataset.ot = parseInt(el.style.top);
    el.dataset.ow = el.offsetWidth;
    el.dataset.oh = el.offsetHeight;
    el.classList.add('snapping');
    el.style.left = '0';
    el.style.top = '0';
    el.style.width = ws.clientWidth + 'px';
    el.style.height = ws.clientHeight + 'px';
    el.dataset.max = '1';
    setTimeout(() => el.classList.remove('snapping'), 300);
  }
  focusW(id);
}

function focusW(id){
  document.querySelectorAll('.fw').forEach(w => w.classList.remove('focused'));
  const el = document.getElementById('fw-' + id);
  if (el){ el.classList.add('focused'); el.style.zIndex = ++topZ; }
  if (id === 'terminal') setTimeout(() => document.getElementById('tIn')?.focus(), 60);
  if (focusMode) updateDim();
}

/* ============================================================
   WINDOW DRAGGING — click title bar, drag anywhere on workspace
   Snap to left/right half or full screen when dragged to edge
   ============================================================ */
(() => {
  let drag = null, offsetX, offsetY;
  const SNAP = 30;

  document.addEventListener('mousedown', e => {
    const tb = e.target.closest('.fw-tb');
    if (!tb || e.target.closest('.fw-dots')) return;
    const wid = tb.dataset.wid;
    const el = document.getElementById('fw-' + wid);
    if (!el || el.dataset.max === '1') return;
    drag = { el, wid };
    const r = el.getBoundingClientRect();
    offsetX = e.clientX - r.left;
    offsetY = e.clientY - r.top;
    focusW(wid);
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!drag) return;
    const ws = document.getElementById('ws');
    const wr = ws.getBoundingClientRect();
    drag.el.style.left = (e.clientX - wr.left - offsetX) + 'px';
    drag.el.style.top  = (e.clientY - wr.top  - offsetY) + 'px';

    // Show snap preview as window approaches an edge
    const guide = document.getElementById('snapG');
    if (e.clientX < wr.left + SNAP){
      guide.style.cssText = `display:block;left:0;top:0;width:${wr.width/2}px;height:${wr.height}px`;
    } else if (e.clientX > wr.right - SNAP){
      guide.style.cssText = `display:block;left:${wr.width/2}px;top:0;width:${wr.width/2}px;height:${wr.height}px`;
    } else if (e.clientY < wr.top + SNAP + 32){
      guide.style.cssText = `display:block;left:0;top:0;width:${wr.width}px;height:${wr.height}px`;
    } else {
      guide.style.display = 'none';
    }
  });

  document.addEventListener('mouseup', e => {
    if (!drag) return;
    const ws = document.getElementById('ws');
    const wr = ws.getBoundingClientRect();
    document.getElementById('snapG').style.display = 'none';

    // Apply the snap if user released near an edge
    if (e.clientX < wr.left + SNAP){
      snapTo(drag.el, 0, 0, wr.width/2, wr.height);
    } else if (e.clientX > wr.right - SNAP){
      snapTo(drag.el, wr.width/2, 0, wr.width/2, wr.height);
    } else if (e.clientY < wr.top + SNAP + 32){
      snapTo(drag.el, 0, 0, wr.width, wr.height);
    }
    drag = null;
  });

  function snapTo(el, l, t, w, h){
    el.classList.add('snapping');
    el.style.left = l + 'px';
    el.style.top = t + 'px';
    el.style.width = w + 'px';
    el.style.height = h + 'px';
    setTimeout(() => el.classList.remove('snapping'), 300);
  }
})();

/* ============================================================
   WINDOW RESIZING — grab any edge or corner
   ============================================================ */
(() => {
  let resize = null, dir, origL, origT, origW, origH, mx, my;

  document.addEventListener('mousedown', e => {
    const handle = e.target.closest('.rh');
    if (!handle) return;
    const wid = handle.dataset.w;
    dir = handle.dataset.d;
    resize = document.getElementById('fw-' + wid);
    origL = parseInt(resize.style.left);
    origT = parseInt(resize.style.top);
    origW = resize.offsetWidth;
    origH = resize.offsetHeight;
    mx = e.clientX;
    my = e.clientY;
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!resize) return;
    const dx = e.clientX - mx;
    const dy = e.clientY - my;
    let nL = origL, nT = origT, nW = origW, nH = origH;
    if (dir.includes('e')) nW = Math.max(280, origW + dx);
    if (dir.includes('w')){ nW = Math.max(280, origW - dx); nL = origL + origW - nW; }
    if (dir.includes('s')) nH = Math.max(180, origH + dy);
    if (dir.includes('n')){ nH = Math.max(180, origH - dy); nT = origT + origH - nH; }
    resize.style.left = nL + 'px';
    resize.style.top = nT + 'px';
    resize.style.width = nW + 'px';
    resize.style.height = nH + 'px';
  });

  document.addEventListener('mouseup', () => { resize = null; });
})();

// Click anywhere on a window brings it to front
document.addEventListener('mousedown', e => {
  const w = e.target.closest('.fw');
  if (w) focusW(w.id.replace('fw-', ''));
});

/* ============================================================
   TERMINAL — the main command-driven interface
   ============================================================ */
let termHistory = [];
let historyIndex = -1;

const MOTD = `<span class="a"> ███╗  ██╗███████╗██████╗ ████████╗
 ████╗ ██║██╔════╝██╔══██╗╚══██╔══╝
 ██╔██╗██║█████╗  ██████╔╝   ██║
 ██║╚████║██╔══╝  ██╔═══╝    ██║
 ██║ ╚███║███████╗██║        ██║
 ╚═╝  ╚══╝╚══════╝╚═╝        ╚═╝</span>
<span class="d">────────────────────────────────────</span>
 <span class="d">Type</span> <span class="c">help</span> <span class="d">for commands · Press</span> <span class="c">?</span>
<span class="d">────────────────────────────────────</span>
`;
let termBuffer = MOTD;

function renderTerm(){
  const el = document.getElementById('b-terminal');
  if (!el) return;
  el.innerHTML = `<div class="t-out" id="tOut">${termBuffer}</div>
    <div class="t-p">
      <span class="t-ps">
        <span style="color:var(--accent-text)">${CU || 'user'}</span><span style="color:var(--tx3)">@nept</span> <span style="color:var(--blue)">~</span> <span style="color:var(--term-prompt)">❯</span>
      </span>
      <input class="t-in" id="tIn" spellcheck="false" onkeydown="termKey(event)">
    </div>`;
  const out = document.getElementById('tOut');
  if (out) out.scrollTop = out.scrollHeight;
  document.getElementById('tIn')?.focus();
}

function termKey(e){
  if (e.key === 'Enter'){
    const v = document.getElementById('tIn').value.trim();
    if (v){ termHistory.unshift(v); historyIndex = -1; execCmd(v); }
    document.getElementById('tIn').value = '';
  } else if (e.key === 'ArrowUp'){
    e.preventDefault();
    if (historyIndex < termHistory.length - 1){
      historyIndex++;
      document.getElementById('tIn').value = termHistory[historyIndex];
    }
  } else if (e.key === 'ArrowDown'){
    e.preventDefault();
    if (historyIndex > 0){
      historyIndex--;
      document.getElementById('tIn').value = termHistory[historyIndex];
    } else {
      historyIndex = -1;
      document.getElementById('tIn').value = '';
    }
  }
}

function termPrint(html){ termBuffer += html + '\n'; renderTerm(); }
function esc(s){ return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* Tokenize a command line, treating "quoted phrases" as one arg */
function parseCommand(raw){
  const tokens = [];
  const re = /"([^"]*)"|(\S+)/g;
  let m;
  while ((m = re.exec(raw)) !== null) tokens.push(m[1] !== undefined ? m[1] : m[2]);
  return tokens;
}

/* The big dispatcher — each keyword gets handled here */
function execCmd(raw){
  termPrint(`<span class="d">❯</span> <span class="c">${esc(raw)}</span>`);
  const p = parseCommand(raw);
  const cmd = p[0]?.toLowerCase();

  if (cmd === 'help'){
    termPrint(`<span class="i">commands:</span>
  <span class="c">set task</span> [high|med|low] "text"   · add a task
  <span class="c">ls tasks</span> · <span class="c">done</span> # · <span class="c">rm task</span> #
  <span class="c">set card</span> "q" "a" ["deck"]   · <span class="c">study</span> · <span class="c">import cards</span>
  <span class="c">set note</span> "title"   · <span class="c">set kanban</span> [col] "title"
  <span class="c">pomo</span> start|stop|reset|set #
  <span class="c">open</span> [window] · <span class="c">close</span> [window]
  <span class="c">open document</span>   · open a file from disk
  <span class="c">theme</span> [name] · <span class="c">light</span> · <span class="c">dark</span>
  <span class="c">neofetch</span> · <span class="c">clear</span>`);
  }
  else if (cmd === 'clear'){ termBuffer = ''; renderTerm(); }
  else if (cmd === 'neofetch'){
    termPrint(`<span class="a">  ${CU}@nept</span>
  <span class="d">──────────────</span>
  <span class="i">Theme:</span>  ${S.theme} (${S.mode})
  <span class="i">Tasks:</span>  ${S.tasks.length} · <span class="i">Cards:</span> ${S.flashcards.length}
  <span class="i">Notes:</span>  ${S.notes.length} · <span class="i">Vault:</span> ${S.vault.length} files
  <span class="i">Pomo:</span>   ${S.pomoSessions} sessions (${S.pomoTotalMin}m)`);
  }
  else if (cmd === 'set' && p[1]?.toLowerCase() === 'task'){
    let priority = 'med', text = '';
    const p2 = (p[2] || '').toLowerCase();
    if (['high','hi','med','medium','low','lo'].includes(p2)){
      priority = {hi:'high',high:'high',med:'med',medium:'med',lo:'low',low:'low'}[p2] || 'med';
      text = p.slice(3).join(' ');
    } else {
      text = p.slice(2).join(' ');
    }
    if (!text) return termPrint('<span class="e">set task [pri] "text"</span>');
    S.tasks.push({
      id: Date.now(), text, done: false, pri: priority,
      q: priority === 'high' ? 1 : priority === 'med' ? 2 : 4
    });
    save();
    termPrint(`<span class="s">✓ "${text}"</span>`);
    rerender('tasks','matrix');
  }
  else if (cmd === 'ls' && p[1]?.toLowerCase() === 'tasks'){
    if (!S.tasks.length) return termPrint('<span class="d">empty</span>');
    S.tasks.forEach((t, i) => termPrint(`  ${t.done ? '<span class="s">✓</span>' : '<span class="d">○</span>'} <span class="d">#${i+1}</span> ${esc(t.text)}`));
  }
  else if (cmd === 'done'){
    const i = parseInt(p[1]) - 1;
    if (isNaN(i) || !S.tasks[i]) return;
    S.tasks[i].done = true;
    S.tasksDone++;
    save();
    termPrint(`<span class="s">✓ done</span>`);
    rerender('tasks','matrix');
  }
  else if (cmd === 'rm' && p[1]?.toLowerCase() === 'task'){
    const i = parseInt(p[2]) - 1;
    if (isNaN(i) || !S.tasks[i]) return;
    S.tasks.splice(i, 1);
    save();
    termPrint('<span class="w">✗ removed</span>');
    rerender('tasks','matrix');
  }
  else if (cmd === 'set' && p[1]?.toLowerCase() === 'card'){
    // Usage: set card "question" "answer" or set card "question" "answer" "deck"
    if (!p[2] || !p[3]) return termPrint('<span class="e">set card "q" "a" ["deck"]</span>');
    const deck = p[4] || (S.fcDeck !== 'all' ? S.fcDeck : 'General');
    // Auto-add deck if it doesn't exist
    if (!S.decks.includes(deck)) S.decks.push(deck);
    S.flashcards.push({
      id: Date.now(), q: p[2], a: p[3], deck,
      ease: 2.5, interval: 1, due: Date.now()
    });
    save();
    termPrint(`<span class="s">✓ card added to ${esc(deck)}</span>`);
    rerender('flashcards');
  }
  else if (cmd === 'study'){ openW('flashcards'); }
  else if (cmd === 'import' && p[1]?.toLowerCase() === 'cards'){
    document.getElementById('cardFileIn').click();
  }
  else if (cmd === 'set' && p[1]?.toLowerCase() === 'note'){
    const t = p.slice(2).join(' ');
    if (!t) return;
    S.notes.unshift({ id: Date.now(), title: t, body: '', updated: Date.now() });
    S.curNote = 0;
    save();
    termPrint('<span class="s">✓ note created</span>');
    rerender('notes');
  }
  else if (cmd === 'set' && p[1]?.toLowerCase() === 'kanban'){
    const col = p[2]?.toLowerCase();
    const title = p.slice(3).join(' ');
    if (!['backlog','todo','doing','done'].includes(col) || !title) return;
    S.kanban[col].push({ id: Date.now(), title });
    save();
    termPrint('<span class="s">✓ card added</span>');
    rerender('kanban');
  }
  else if (cmd === 'pomo'){
    const sub = p[1]?.toLowerCase();
    if (sub === 'start' && !pomo.running){ togglePomo(); }
    else if (sub === 'stop' && pomo.running){ togglePomo(); }
    else if (sub === 'reset'){ resetPomo(); }
    else if (sub === 'set'){
      const m = parseInt(p[2]);
      if (m){ S.pomoTimes.focus = m; save(); pomo.timeLeft = m * 60; updatePomoUI(); }
    }
  }
  else if (cmd === 'open'){
    if (p[1]?.toLowerCase() === 'document'){
      document.getElementById('fileIn').click();
    } else {
      const w = p[1]?.toLowerCase();
      if (W[w]) openW(w);
      else termPrint('<span class="e">unknown window</span>');
    }
  }
  else if (cmd === 'close'){
    const w = p[1]?.toLowerCase();
    if (W[w]) closeW(w);
  }
  else if (cmd === 'theme'){
    const t = p[1]?.toLowerCase();
    if (THEMES[t]){ applyTheme(t); rerender('settings'); }
    else termPrint(`<span class="e">themes: ${Object.keys(THEMES).join(', ')}</span>`);
  }
  else if (cmd === 'light'){ S.mode = 'light'; save(); applyTheme(S.theme); }
  else if (cmd === 'dark'){ S.mode = 'dark'; save(); applyTheme(S.theme); }
  else {
    termPrint(`<span class="e">unknown: ${esc(cmd)}</span> · type <span class="c">help</span>`);
  }
}

/* Re-render any currently open windows */
function rerender(...ids){
  ids.forEach(id => { if (W[id]?.o) W[id].r(); });
}

/* ============================================================
   FILE HANDLERS — document opening, card import, bg upload
   ============================================================ */
function handleFile(e){
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    // Drop the file contents into a new note
    S.notes.unshift({
      id: Date.now(),
      title: '📄 ' + f.name,
      body: ev.target.result,
      updated: Date.now()
    });
    S.curNote = 0;
    save();
    openW('notes');
  };
  r.readAsText(f);
  e.target.value = '';
}

function handleCardFile(e){
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      // Try parsing as JSON array first
      const data = JSON.parse(ev.target.result);
      if (Array.isArray(data)){
        data.forEach(c => {
          const deck = c.deck || (S.fcDeck !== 'all' ? S.fcDeck : 'General');
          S.flashcards.push({
            id: Date.now() + Math.random(),
            q: c.q || c.front || c.question || '',
            a: c.a || c.back || c.answer || '',
            deck,
            ease: 2.5, interval: 1, due: Date.now()
          });
        });
      }
    } catch (err){
      // Fall back to CSV/TSV — one "q, a" per line
      ev.target.result.split('\n').filter(l => l.trim()).forEach(l => {
        const parts = l.split(/[,\t]/);
        if (parts.length >= 2){
          S.flashcards.push({
            id: Date.now() + Math.random(),
            q: parts[0].trim(),
            a: parts[1].trim(),
            deck: S.fcDeck !== 'all' ? S.fcDeck : 'General',
            ease: 2.5, interval: 1, due: Date.now()
          });
        }
      });
    }
    save();
    rerender('flashcards');
  };
  r.readAsText(f);
  e.target.value = '';
}

/**
 * Background image upload.
 * We deliberately restrict to static formats (PNG/JPG/WebP).
 * GIFs were causing performance issues with the matrix rain canvas
 * compositing over them so they're disabled for now.
 */
function handleBgFile(e){
  const f = e.target.files[0];
  if (!f) return;
  // Safety: reject large files that would crash the page
  if (f.size > 8 * 1024 * 1024){
    alert('Background image too large (max 8MB). Use a smaller file.');
    e.target.value = '';
    return;
  }
  const r = new FileReader();
  r.onload = ev => {
    S.bgImage = ev.target.result;
    save();
    applyTheme(S.theme);
    rerender('settings');
  };
  r.readAsDataURL(f);
  e.target.value = '';
}

/* ============================================================
   VAULT — personal file storage
   PDFs open in their own floating windows (new behavior)
   ============================================================ */
function handleVaultFiles(e){
  Array.from(e.target.files).forEach(f => {
    // Cap individual file size to prevent localStorage overflow
    if (f.size > 5 * 1024 * 1024){
      alert(`"${f.name}" is too large (${(f.size/1024/1024).toFixed(1)}MB). Max 5MB per file.`);
      return;
    }
    const r = new FileReader();
    r.onload = ev => {
      S.vault.push({
        id: Date.now() + Math.random(),
        name: f.name,
        size: f.size,
        type: f.type,
        data: ev.target.result,
        added: Date.now()
      });
      save();
      rerender('vault');
    };
    // PDFs and images need data URLs, text files stay as text
    if (f.type.startsWith('image') || f.type === 'application/pdf'){
      r.readAsDataURL(f);
    } else {
      r.readAsText(f);
    }
  });
  e.target.value = '';
}

function renderVault(){
  const el = document.getElementById('b-vault');
  if (!el) return;

  // File type → emoji icon lookup
  const icons = {
    'text/': '📄',
    'application/json': '📋',
    'application/pdf': '📑',
    'image/': '🖼',
    'default': '📁'
  };
  function iconFor(type){
    for (const [k, v] of Object.entries(icons)){
      if (type?.startsWith(k)) return v;
    }
    return icons.default;
  }

  el.innerHTML = `
    <div class="vault-drop" onclick="document.getElementById('vaultFileIn').click()">
      📂 Click to upload files
    </div>
    ${S.vault.length ? `
      <div class="sl">${S.vault.length} file${S.vault.length === 1 ? '' : 's'}</div>
      <div class="vault-list">
        ${S.vault.map((f, i) => `
          <div class="vault-item" onclick="openVaultFile(${i})">
            <span style="font-size:16px">${iconFor(f.type)}</span>
            <div style="flex:1;min-width:0">
              <div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(f.name)}</div>
              <div style="font-size:10px;color:var(--tx4)">${(f.size/1024).toFixed(1)}KB</div>
            </div>
            <span class="vault-del" onclick="event.stopPropagation();S.vault.splice(${i},1);save();renderVault()">✕</span>
          </div>
        `).join('')}
      </div>
    ` : '<div style="color:var(--tx4);font-size:12px;text-align:center;padding:20px">Empty vault</div>'}
  `;
}

/* Open a vault file — PDFs get their own window, images too, text goes into Notes */
function openVaultFile(index){
  const file = S.vault[index];
  if (!file) return;

  if (file.type === 'application/pdf'){
    // Spawn a dedicated PDF viewer window
    pdfWinCount++;
    const winId = 'pdf_' + pdfWinCount;
    W[winId] = {
      l: file.name.length > 20 ? file.name.substring(0, 18) + '…' : file.name,
      o: true,
      x: 100 + (pdfWinCount * 30),
      y: 80 + (pdfWinCount * 30),
      w: 700, h: 600,
      r: () => {
        const el = document.getElementById('b-' + winId);
        if (el) el.innerHTML = `<iframe class="pdf-viewer" src="${file.data}"></iframe>`;
      }
    };
    spawnWin(winId);
  }
  else if (file.type?.startsWith('image')){
    // Spawn an image viewer window
    pdfWinCount++;
    const winId = 'pdf_' + pdfWinCount;
    W[winId] = {
      l: file.name.length > 20 ? file.name.substring(0, 18) + '…' : file.name,
      o: true,
      x: 100 + (pdfWinCount * 30),
      y: 80 + (pdfWinCount * 30),
      w: 500, h: 500,
      r: () => {
        const el = document.getElementById('b-' + winId);
        if (el) el.innerHTML = `<img src="${file.data}" style="max-width:100%;max-height:100%;display:block;margin:0 auto;border-radius:var(--rs)">`;
      }
    };
    spawnWin(winId);
  }
  else {
    // Text / code files open into Notes
    S.notes.unshift({
      id: Date.now(),
      title: '📄 ' + file.name,
      body: file.data,
      updated: Date.now()
    });
    S.curNote = 0;
    save();
    openW('notes');
  }
}

/* ============================================================
   POMODORO — focus timer with session log
   ============================================================ */
const POMO_CIRCUMFERENCE = 2 * Math.PI * 67;
let pomo = { running: false, mode: 'focus', timeLeft: 25 * 60, interval: null };

function getPomoTotal(){ return S.pomoTimes[pomo.mode] * 60; }

function updatePomoUI(){
  const m = Math.floor(pomo.timeLeft / 60);
  const s = pomo.timeLeft % 60;
  const display = document.getElementById('pT');
  if (display) display.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const ring = document.getElementById('pR');
  if (ring){
    const progress = 1 - pomo.timeLeft / getPomoTotal();
    ring.style.strokeDashoffset = POMO_CIRCUMFERENCE * (1 - progress);
  }
}

function togglePomo(){
  if (pomo.running){
    // Pause
    clearInterval(pomo.interval);
    pomo.running = false;
  } else {
    // Start
    pomo.running = true;
    pomo.interval = setInterval(() => {
      pomo.timeLeft--;
      if (pomo.timeLeft <= 0){
        // Session complete
        clearInterval(pomo.interval);
        pomo.running = false;
        if (pomo.mode === 'focus'){
          S.pomoSessions++;
          S.pomoTotalMin += S.pomoTimes.focus;
          const note = document.getElementById('pN')?.value.trim() || '';
          S.pomoLog.unshift({
            time: new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' }),
            dur: S.pomoTimes.focus,
            note
          });
          S.heatmap[27] = Math.min(4, (S.heatmap[27] || 0) + 1);
          save();
        }
        // Ring a little bell
        try {
          const c = new AudioContext();
          const o = c.createOscillator();
          const g = c.createGain();
          o.connect(g); g.connect(c.destination);
          o.frequency.value = 830;
          g.gain.setValueAtTime(0.2, c.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 1);
          o.start(); o.stop(c.currentTime + 1);
        } catch (e){}
        // Alternate between focus and breaks
        setPomoMode(pomo.mode === 'focus'
          ? (S.pomoSessions % 4 === 0 ? 'long' : 'short')
          : 'focus');
      }
      updatePomoUI();
    }, 1000);
  }
  renderPomo();
}

function resetPomo(){
  clearInterval(pomo.interval);
  pomo.running = false;
  pomo.timeLeft = getPomoTotal();
  renderPomo();
}

function setPomoMode(m){
  pomo.mode = m;
  pomo.timeLeft = S.pomoTimes[m] * 60;
  pomo.running = false;
  clearInterval(pomo.interval);
  renderPomo();
}

function renderPomo(){
  const el = document.getElementById('b-pomodoro');
  if (!el) return;
  el.innerHTML = `
    <div class="po-edit" id="pE">
      <div class="sl">Edit Timer</div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <label style="font-size:12px;color:var(--tx2);width:40px">Focus</label>
        <input class="input" type="number" id="eF" value="${S.pomoTimes.focus}" style="width:50px;text-align:center">
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <label style="font-size:12px;color:var(--tx2);width:40px">Short</label>
        <input class="input" type="number" id="eS" value="${S.pomoTimes.short}" style="width:50px;text-align:center">
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <label style="font-size:12px;color:var(--tx2);width:40px">Long</label>
        <input class="input" type="number" id="eL" value="${S.pomoTimes.long}" style="width:50px;text-align:center">
      </div>
      <div style="display:flex;gap:4px">
        <button class="btn btn-g" onclick="savePomoEdit()">OK</button>
        <button class="btn" onclick="document.getElementById('pE').classList.remove('show')">✕</button>
      </div>
    </div>
    <div class="po-w">
      <div class="po-rb">
        <svg viewBox="0 0 150 150">
          <circle class="po-bg" cx="75" cy="75" r="67"/>
          <circle class="po-fg" id="pR" cx="75" cy="75" r="67"/>
        </svg>
        <div class="po-t" id="pT" onclick="if(!pomo.running)document.getElementById('pE').classList.add('show')">--:--</div>
        <div class="po-ph" id="pPh">${ {focus:'Focus', short:'Break', long:'Long Break'}[pomo.mode] }</div>
      </div>
      <div class="po-btns">
        <button class="btn btn-g" onclick="togglePomo()">${pomo.running ? 'PAUSE' : 'START'}</button>
        <button class="btn" onclick="resetPomo()">RESET</button>
        <button class="btn" onclick="skipPomo()">SKIP</button>
      </div>
      <div class="po-modes">
        <button class="po-mb ${pomo.mode==='focus'?'act':''}" onclick="setPomoMode('focus')">Focus</button>
        <button class="po-mb ${pomo.mode==='short'?'act':''}" onclick="setPomoMode('short')">Short</button>
        <button class="po-mb ${pomo.mode==='long'?'act':''}" onclick="setPomoMode('long')">Long</button>
      </div>
      <div class="po-dots">
        ${Array(4).fill(0).map((_,i) => `<div class="po-d ${i < S.pomoSessions % 4 ? 'dn' : ''}"></div>`).join('')}
      </div>
    </div>
    <textarea class="po-note" id="pN" placeholder="session note..."></textarea>
    <div class="sl">Log</div>
    <div class="po-log">
      ${S.pomoLog.slice(0, 6).map(e => `
        <div class="po-le">
          <div><span style="color:var(--accent)">●</span> ${e.dur}m${e.note ? ` <span style="color:var(--tx4)">— ${esc(e.note)}</span>` : ''}</div>
          <span style="color:var(--tx4)">${e.time}</span>
        </div>
      `).join('')}
    </div>`;
  updatePomoUI();
}
function savePomoEdit(){
  S.pomoTimes.focus = parseInt(document.getElementById('eF').value) || 25;
  S.pomoTimes.short = parseInt(document.getElementById('eS').value) || 5;
  S.pomoTimes.long  = parseInt(document.getElementById('eL').value) || 15;
  save();
  pomo.timeLeft = getPomoTotal();
  document.getElementById('pE').classList.remove('show');
  renderPomo();
}
function skipPomo(){
  clearInterval(pomo.interval);
  pomo.running = false;
  setPomoMode(pomo.mode === 'focus' ? 'short' : 'focus');
}

      </select>

      ? S.tasks.map(t => `
          <div class="ti">
            <div class="tc ${t.done ? 'dn' : ''}" onclick="toggleTask(${t.id})"></div>
            <span class="tt ${t.done ? 'dn' : ''}">${esc(t.text)}</span>
            <span class="badge b-${t.pri === 'high' ? 'hi' : t.pri === 'med' ? 'md' : 'lo'}">${t.pri}</span>

function addTaskFromGUI(){
  const input = document.getElementById('tI');
  if (!input?.value.trim()) return;
  const priority = document.getElementById('tP').value;
  S.tasks.push({
    id: Date.now(),
    text: input.value.trim(),
    done: false,
    pri: priority,
    q: priority === 'high' ? 1 : priority === 'med' ? 2 : 4
  });
  input.value = '';
  save();
  renderTasks();
  rerender('matrix');
}
function toggleTask(id){
  const t = S.tasks.find(x => x.id === id);
  if (t){
    t.done = !t.done;
    if (t.done) S.tasksDone++;
    save();
    renderTasks();
    rerender('matrix');
  }
}

let kanbanDrag = null;
function renderKanban(){
  const el = document.getElementById('b-kanban');
  if (!el) return;
  const cols = ['backlog', 'todo', 'doing', 'done'];
  el.innerHTML = `<div class="kb-c">${cols.map(col => `
    <div class="kb-co">
      <div class="kb-h">
        <span class="kb-n">${col === 'todo' ? 'To Do' : col === 'doing' ? 'In Progress' : col[0].toUpperCase() + col.slice(1)} <span class="kb-ct">${(S.kanban[col] || []).length}</span></span>
        ${col !== 'done' ? `<button class="btn btn-s" onclick="addKanban('${col}')">+</button>` : ''}
      </div>
      <div class="kb-cs" ondragover="event.preventDefault()" ondrop="dropKanban('${col}')">
        ${(S.kanban[col] || []).map(c => `
          <div class="kb-cd" draggable="true" ondragstart="kanbanDrag={id:${c.id},from:'${col}'}">${esc(c.title)}</div>
        `).join('')}
      </div>
    </div>
  `).join('')}</div>`;
}
function addKanban(col){
  // Create inline input at top of column
  const colEl = document.querySelector(`[ondrop="dropKanban('${col}')"]`);
  if (!colEl) return;
  const existing = colEl.querySelector('.kb-inline-add');
  if (existing){ existing.focus(); return; }
  const inp = document.createElement('input');
  inp.className = 'input kb-inline-add';
  inp.placeholder = 'card title...';
  inp.style.cssText = 'font-size:12px;margin-bottom:4px';
  inp.onkeydown = e => {
    if (e.key === 'Enter' && inp.value.trim()){
      S.kanban[col].push({ id: Date.now(), title: inp.value.trim() });
      save();
      renderKanban();
    }
    if (e.key === 'Escape') inp.remove();
  };
  inp.onblur = () => { if (!inp.value.trim()) inp.remove(); };
  colEl.prepend(inp);
  inp.focus();
}
function dropKanban(toCol){
  if (!kanbanDrag) return;
  let card;
  for (const c of Object.keys(S.kanban)){
    const i = S.kanban[c].findIndex(x => x.id === kanbanDrag.id);
    if (i >= 0){ card = S.kanban[c].splice(i, 1)[0]; break; }
  }
  if (card){
    S.kanban[toCol].push(card);
    save();
    renderKanban();
  }
  kanbanDrag = null;
}

function renderNotes(){
  const el = document.getElementById('b-notes');
  if (!el) return;
  el.innerHTML = `
    <div style="display:flex;gap:8px;height:100%">
      <div style="width:130px;flex-shrink:0">
        <button class="btn btn-g btn-s" style="width:100%;margin-bottom:4px" onclick="newNote()">+ New</button>
        <div class="nl">
          ${S.notes.map((n, i) => `
            <div class="ni ${i === S.curNote ? 'act' : ''}" onclick="selectNote(${i})">${esc(n.title || 'untitled')}</div>
          `).join('')}
        </div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column">
        <input class="input" id="nT" value="${esc(S.notes[S.curNote]?.title || '')}" placeholder="title..." style="margin-bottom:4px;font-size:15px;font-weight:700" oninput="updateNoteTitle(this.value)">
        <textarea class="input" id="nB" placeholder="start typing..." style="flex:1;min-height:160px;line-height:1.6;font-size:13px;resize:none" oninput="updateNoteBody(this.value)">${esc(S.notes[S.curNote]?.body || '')}</textarea>
      </div>

function newNote(){
  S.notes.unshift({ id: Date.now(), title: '', body: '', updated: Date.now() });
  S.curNote = 0;

  renderNotes();

/* SM-2-inspired spaced repetition ratings */
function rateCard(id, rating){
  const c = S.flashcards.find(x => x.id === id);
  if (!c) return;
  if (rating === 0){ c.interval = 1; c.ease = Math.max(1.3, c.ease - 0.2); }
  else if (rating === 1){ c.interval = Math.max(1, Math.ceil(c.interval * 1.2)); }
  else if (rating === 2){ c.interval = Math.ceil(c.interval * c.ease); c.ease += 0.05; }
  else { c.interval = Math.ceil(c.interval * c.ease * 1.3); c.ease += 0.15; }
  c.due = Date.now() + c.interval * 86400000;
  S.fcIdx++;
  save();
  renderFC();
}

/**
 * Capture a keybind combo from a keyboard event, store it in S.keybinds.
 * Listens for modifiers + a single key, rebuilds string like "Ctrl+K"
 */
function captureKeybind(e, action){
  e.preventDefault();
  // Ignore pure modifier presses
  if (['Control','Shift','Alt','Meta'].includes(e.key)) return;
  const parts = [];
  if (e.ctrlKey) parts.push('Ctrl');
  if (e.shiftKey) parts.push('Shift');
  if (e.altKey) parts.push('Alt');
  if (e.metaKey) parts.push('Meta');
  let key = e.key;
  if (key === ' ') key = 'Space';
  else if (key.length === 1) key = key.toUpperCase();
  parts.push(key);
  S.keybinds[action] = parts.join('+');
  save();
  renderSettings();
}

/* ============================================================
   GLOBAL KEYBOARD HANDLER — reads user's custom keybinds
   ============================================================ */
function keybindMatches(event, combo){
  const parts = combo.split('+');
  const mainKey = parts[parts.length - 1].toLowerCase();
  const needsCtrl = parts.includes('Ctrl');
  const needsShift = parts.includes('Shift');
  const needsAlt = parts.includes('Alt');
  const needsMeta = parts.includes('Meta');
  if (needsCtrl !== (event.ctrlKey || event.metaKey)) return false;
  if (needsShift !== event.shiftKey) return false;
  if (needsAlt !== event.altKey) return false;
  let eventKey = event.key.toLowerCase();
  if (event.code === 'Space') eventKey = 'space';
  return eventKey === mainKey.toLowerCase();
}

document.addEventListener('keydown', e => {
  // Quick capture
  if (keybindMatches(e, S.keybinds.capture)){
    e.preventDefault();
    openCap();
    return;
  }
  // Focus mode — skip when typing in inputs
  if (keybindMatches(e, S.keybinds.focus) && !e.target.closest('input,textarea,[contenteditable]')){
    e.preventDefault();
    toggleFocus();
    return;
  }
  // Escape closes overlays
  if (e.key === 'Escape'){
    closeCap();
    document.getElementById('helpOv').classList.remove('show');
    closeAllDD();
  }
  // Help
  if (e.key === '?' && !e.target.closest('input,textarea,[contenteditable]')){
    e.preventDefault();
    toggleHelp();
  }
});
