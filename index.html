<!DOCTYPE html>
<html lang="en" data-mode="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEPT</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--g0:#0a0a0a;--g1:#111;--g2:#171717;--g3:#1e1e1e;--g4:#262626;--accent:#87FF65;--at:#87FF65;--tp:#87FF65;--tb:#171717;--red:#ff5c5c;--yel:#ffc857;--blu:#65b8ff;--pur:#c87fff;--tx1:#e8e8e8;--tx2:#999;--tx3:#666;--tx4:#444;--brd:rgba(255,255,255,.04);--brd2:rgba(255,255,255,.1);--brdA:rgba(255,255,255,.18);--glass:rgba(14,14,14,.9);--fm:'VT323',monospace;--fm2:'Share Tech Mono',monospace;--bar:34px;--r:8px}
[data-mode=light]{--g0:#f4f4f2;--g1:#ebebea;--g2:#e1e1df;--g3:#d7d7d5;--g4:#ccc;--tx1:#1a1a1a;--tx2:#555;--tx3:#888;--tx4:#aaa;--brd:rgba(0,0,0,.05);--brd2:rgba(0,0,0,.1);--brdA:rgba(0,0,0,.17);--glass:rgba(244,244,242,.88);--red:#d94040;--yel:#c89e30;--blu:#3a8ad4;--pur:#9050d0}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;overflow:hidden}
body{font-family:var(--fm);background:var(--g0);color:var(--tx1);font-size:16px;line-height:1.3;transition:background .3s,color .3s}
body.has-bg{background-size:cover;background-position:center}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:4px}
::selection{background:rgba(135,255,101,.15)}
canvas#mx{position:fixed;inset:0;z-index:0;opacity:.05;pointer-events:none}[data-mode=light] canvas#mx{opacity:.02}
button{font-family:var(--fm);cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
.taskbar{height:var(--bar);display:flex;align-items:center;padding:0 10px;background:var(--glass);backdrop-filter:blur(16px);border-bottom:1px solid var(--brd);z-index:200;position:relative}
.tb-logo{display:flex;align-items:center;gap:6px;padding-right:12px;border-right:1px solid var(--brd);margin-right:6px}
.tb-lg{width:20px;height:20px;background:var(--accent);border-radius:4px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;color:var(--g0)}
.tb-ln{font-size:14px;font-weight:700;color:var(--accent);letter-spacing:4px}
.tb-w{font-size:13px;color:var(--tx2);padding:0 12px;border-right:1px solid var(--brd);margin-right:4px;white-space:nowrap;max-width:260px;overflow:hidden}
.tb-w b{color:var(--at);font-weight:400}
.dd{position:relative}.dd-b{padding:4px 10px;font-size:13px;color:var(--tx3);border-radius:3px;display:flex;align-items:center;gap:4px;transition:all .12s}
.dd-b:hover,.dd-b.open{color:var(--tx1);background:var(--brd)}
.dd-m{position:absolute;top:calc(100% + 4px);left:0;min-width:170px;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--brd2);border-radius:var(--r);padding:4px;box-shadow:0 8px 30px rgba(0,0,0,.3);z-index:300;display:none;animation:ddI .25s cubic-bezier(.16,1,.3,1)}
.dd-m.show{display:block}@keyframes ddI{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.dd-i{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:5px;font-size:13px;color:var(--tx2);transition:all .12s;width:100%;text-align:left}
.dd-i:hover{background:var(--brd);color:var(--tx1)}.dd-s{height:1px;background:var(--brd);margin:3px 6px}
.tb-r{display:flex;align-items:center;gap:4px;margin-left:auto}
.tb-clk{color:var(--tx3);font-size:13px;padding:0 8px;letter-spacing:1px;font-family:var(--fm2)}
.ib{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:4px;color:var(--tx3);font-size:12px;transition:all .12s}
.ib:hover{color:var(--accent);background:var(--brd)}.ib:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.tb-u{display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:14px;background:var(--brd);border:1px solid var(--brd);font-size:12px;color:var(--tx2);margin-left:4px}
.tb-u:hover{border-color:var(--brd2)}
.tb-av{width:18px;height:18px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--g0)}
.ws{position:relative;width:100%;height:calc(100vh - var(--bar));overflow:hidden;z-index:1}
.app{display:none;flex-direction:column;height:100%}.app.show{display:flex}
/* Windows */
.fw{position:absolute;display:flex;flex-direction:column;min-width:280px;min-height:180px;border:1px solid var(--brd);border-radius:var(--r);box-shadow:0 6px 30px rgba(0,0,0,.35);overflow:visible;backdrop-filter:blur(14px);z-index:10;animation:fwI .4s cubic-bezier(.16,1,.3,1)}
@keyframes fwI{from{opacity:0;transform:scale(.92) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.fw.foc{z-index:50;border-color:var(--brd2);box-shadow:0 10px 40px rgba(0,0,0,.45)}
.fw.dim{opacity:.12;pointer-events:none;filter:blur(1.5px)}
.fw.snap{transition:left .3s cubic-bezier(.16,1,.3,1),top .3s cubic-bezier(.16,1,.3,1),width .3s cubic-bezier(.16,1,.3,1),height .3s cubic-bezier(.16,1,.3,1)}
.fw-t{height:30px;min-height:30px;display:flex;align-items:center;padding:0 10px;cursor:grab;user-select:none;border-bottom:1px solid var(--brd);background:var(--tb);gap:6px;border-radius:var(--r) var(--r) 0 0}
.fw-t:active{cursor:grabbing}
.fw-d{display:flex;gap:5px}.fw-dot{width:11px;height:11px;border-radius:50%;padding:0}
.dot-r{background:var(--red)}.dot-y{background:var(--yel)}.dot-g{background:var(--accent)}
.fw-tl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--tx4);flex:1;text-align:center;pointer-events:none}
.fw-b{flex:1;overflow:hidden;display:flex;flex-direction:column}.fw-in{flex:1;overflow-y:auto;padding:12px}
.rh{position:absolute;z-index:2}.rh-n{top:-4px;left:10px;right:10px;height:8px;cursor:n-resize}.rh-s{bottom:-4px;left:10px;right:10px;height:8px;cursor:s-resize}.rh-w{left:-4px;top:10px;bottom:10px;width:8px;cursor:w-resize}.rh-e{right:-4px;top:10px;bottom:10px;width:8px;cursor:e-resize}.rh-nw{top:-4px;left:-4px;width:14px;height:14px;cursor:nw-resize}.rh-ne{top:-4px;right:-4px;width:14px;height:14px;cursor:ne-resize}.rh-sw{bottom:-4px;left:-4px;width:14px;height:14px;cursor:sw-resize}.rh-se{bottom:-4px;right:-4px;width:14px;height:14px;cursor:se-resize}
.sg{position:absolute;background:var(--brd);border:1px dashed var(--brd2);z-index:999;pointer-events:none;border-radius:5px;display:none}
/* Shared */
.sl{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--tx4);margin:8px 0 6px;display:flex;align-items:center;gap:6px}.sl::after{content:'';flex:1;height:1px;background:var(--brd)}
.btn{padding:6px 14px;border-radius:5px;border:1px solid var(--brd);background:var(--g3);color:var(--tx2);font-size:13px;transition:all .15s}.btn:hover{border-color:var(--brd2);color:var(--tx1)}.btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.btn-a{background:var(--brd);border-color:var(--brdA);color:var(--accent)}.btn-a:hover{background:var(--brd2)}
.btn-d{border-color:rgba(255,92,92,.3);color:var(--red)}.btn-s{padding:3px 10px;font-size:11px}
.inp{width:100%;padding:7px 10px;background:var(--g2);border:1px solid var(--brd);border-radius:5px;color:var(--tx1);font-family:var(--fm);font-size:14px;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--brdA)}.inp::placeholder{color:var(--tx4)}
textarea.inp{resize:vertical;min-height:60px;line-height:1.6}
.badge{font-size:11px;padding:1px 7px;border-radius:8px}.b-hi{background:rgba(255,92,92,.1);color:var(--red)}.b-md{background:rgba(255,200,87,.08);color:var(--yel)}.b-lo{background:var(--brd);color:var(--accent)}
.tab-bar{display:flex;gap:1px;background:var(--g2);border-radius:5px;padding:2px;margin-bottom:8px}
.tab{flex:1;padding:5px 8px;text-align:center;font-size:11px;border-radius:4px;color:var(--tx3);transition:all .2s}.tab.act{background:var(--brd);color:var(--accent)}
.tc{display:none}.tc.act{display:block;animation:tcI .3s cubic-bezier(.16,1,.3,1)}@keyframes tcI{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
/* Tasks */
.ti{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;background:var(--g2);border-radius:5px;margin-bottom:3px;border:1px solid transparent;transition:all .1s}.ti:hover{border-color:var(--brd)}
.tchk{width:15px;height:15px;min-width:15px;border-radius:50%;border:2px solid var(--tx4);margin-top:2px;padding:0;background:none;transition:all .15s}.tchk:hover{border-color:var(--accent)}.tchk.dn{background:var(--accent);border-color:var(--accent)}
.ttxt{flex:1;font-size:14px;line-height:1.4}.ttxt.dn{text-decoration:line-through;color:var(--tx4)}
.tmeta{display:flex;gap:8px;align-items:center;margin-top:3px;font-size:11px;color:var(--tx4);flex-wrap:wrap}
.subs{margin-top:4px;padding-left:8px}.sub-i{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--tx2);padding:2px 0}
.sub-c{width:12px;height:12px;min-width:12px;border-radius:3px;border:1.5px solid var(--tx4);padding:0;background:none;transition:all .12s}.sub-c.dn{background:var(--accent);border-color:var(--accent)}
/* Kanban */
.kb-board{display:flex;gap:6px;height:100%;overflow-x:auto}
.kb-col{min-width:160px;flex:1;background:var(--g2);border-radius:5px;padding:8px;display:flex;flex-direction:column;border:1px solid var(--brd)}
.kb-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--brd)}
.kb-n{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx4)}
.kb-cnt{background:var(--brd);color:var(--accent);width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px}
.kb-cards{flex:1;display:flex;flex-direction:column;gap:3px;overflow-y:auto}
.kb-cd{background:var(--g1);border:1px solid var(--brd);border-radius:5px;padding:7px 9px;cursor:grab;transition:all .15s;font-size:13px}.kb-cd:hover{border-color:var(--brd2);transform:translateY(-1px)}
/* Notes */
.nl{display:flex;flex-direction:column;gap:2px;max-height:160px;overflow-y:auto;margin-bottom:6px}
.ni{padding:5px 8px;border-radius:4px;font-size:12px;color:var(--tx2);transition:all .12s;text-align:left;width:100%}.ni:hover{background:var(--brd)}.ni.act{background:var(--brd);color:var(--accent)}
/* Planner */
.pl-r{display:flex;gap:6px;margin-bottom:2px}.pl-t{width:50px;font-size:12px;color:var(--tx4);padding-top:4px;text-align:right;flex-shrink:0;font-family:var(--fm2)}
.pl-s{flex:1;padding:5px 10px;background:var(--g2);border-radius:4px;border:1px solid transparent;font-size:13px;min-height:28px;color:var(--tx2);outline:none;transition:all .12s}
.pl-s:focus{border-color:var(--brdA)}.pl-s.filled{border-left:2px solid var(--accent);color:var(--accent);background:var(--brd)}
/* Calendar */
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-h{font-size:10px;color:var(--tx4);text-align:center;padding:6px 0;letter-spacing:1px}
.cal-d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:13px;color:var(--tx2);position:relative;transition:all .12s;background:none;border:none;padding:0;width:100%;font-family:var(--fm)}
.cal-d:hover{background:var(--brd)}.cal-d.today{background:var(--brd2);color:var(--accent);font-weight:700}
.cal-d.other{color:var(--tx4);opacity:.4}
.cal-d.has-t::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;background:var(--accent);border-radius:50%}
/* Flashcards */
.fc{perspective:800px;width:100%;height:150px;cursor:pointer;margin-bottom:8px}
.fc-in{position:relative;width:100%;height:100%;transition:transform .5s cubic-bezier(.16,1,.3,1);transform-style:preserve-3d}
.fc.flip .fc-in{transform:rotateY(180deg)}
.fc-f{position:absolute;inset:0;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;padding:16px;border-radius:var(--r);font-size:15px;text-align:center;line-height:1.5}
.fc-fr{background:var(--g3);border:1px solid var(--brd)}.fc-bk{background:var(--brd);border:1px solid var(--brd2);color:var(--accent);transform:rotateY(180deg)}
.fc-fl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--tx4);position:absolute;top:6px;left:10px}
.fc-rate{display:flex;justify-content:center;gap:6px;margin-top:6px}
.fc-rb{padding:5px 14px;border-radius:5px;font-size:11px;transition:all .15s}
.fc-ra{background:rgba(255,92,92,.08);color:var(--red);border:1px solid rgba(255,92,92,.15)}
.fc-rh{background:rgba(255,200,87,.08);color:var(--yel);border:1px solid rgba(255,200,87,.15)}
.fc-rg{background:var(--brd);color:var(--accent);border:1px solid var(--brdA)}
.fc-re{background:rgba(101,184,255,.08);color:var(--blu);border:1px solid rgba(101,184,255,.15)}
.fc-list{display:flex;flex-direction:column;gap:3px;max-height:140px;overflow-y:auto}
.fc-li{display:flex;align-items:center;padding:4px 8px;background:var(--g2);border-radius:4px;font-size:12px;color:var(--tx2)}
.fc-li span:first-child{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Matrix */
.mx-g{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:4px;height:100%}
.mx-q{background:var(--g2);border-radius:5px;padding:8px;display:flex;flex-direction:column;border:1px solid var(--brd);overflow-y:auto}
.mx-ql{font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.mx-dt{width:5px;height:5px;border-radius:2px}
.q1 .mx-dt{background:var(--red)}.q1 .mx-ql{color:var(--red)}.q2 .mx-dt{background:var(--yel)}.q2 .mx-ql{color:var(--yel)}.q3 .mx-dt{background:var(--blu)}.q3 .mx-ql{color:var(--blu)}.q4 .mx-dt{background:var(--tx4)}.q4 .mx-ql{color:var(--tx4)}
.mx-i{font-size:12px;padding:4px 6px;background:var(--g1);border-radius:4px;margin-bottom:3px;border:1px solid transparent;width:100%;text-align:left}.mx-i:hover{border-color:var(--brd2)}
/* Analytics */
.an-g{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.an-c{background:var(--g2);border-radius:5px;padding:10px;border:1px solid var(--brd)}
.an-c h4{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--tx4);margin-bottom:4px}
.an-b{font-size:28px;font-weight:800;color:var(--accent)}
.hm{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.hm-c{aspect-ratio:1;border-radius:2px;background:var(--g1)}.hm-c.l1{background:var(--brd)}.hm-c.l2{background:var(--brd2)}.hm-c.l3{background:var(--brdA)}.hm-c.l4{background:var(--accent);opacity:.5}
/* Vault */
.v-drop{width:100%;padding:16px;border:2px dashed var(--brd2);border-radius:var(--r);text-align:center;color:var(--tx3);font-size:13px;transition:all .15s;margin-bottom:8px}
.v-drop:hover{border-color:var(--accent);color:var(--accent)}
.v-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--g2);border-radius:5px;border:1px solid transparent;margin-bottom:3px;font-size:13px;width:100%;text-align:left}.v-item:hover{border-color:var(--brd2)}
.v-del{color:var(--red);font-size:12px;opacity:0;transition:opacity .12s;margin-left:auto}.v-item:hover .v-del{opacity:1}
/* Settings */
.th-g{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:8px}
.th-c{padding:10px 4px;border-radius:5px;border:2px solid var(--brd);text-align:center;font-size:11px;transition:all .15s;width:100%}.th-c:hover{border-color:var(--brd2)}.th-c.act{border-color:var(--accent)}
.cc{display:flex;align-items:center;gap:10px;margin-bottom:6px}.cc label{font-size:12px;color:var(--tx2);flex:1}
.cc input[type=color]{width:32px;height:24px;border:1px solid var(--brd);border-radius:3px;background:var(--g2);cursor:pointer;padding:2px}
.sc{display:flex;align-items:center;gap:10px;margin-bottom:8px}.sc label{font-size:12px;color:var(--tx2);width:90px}
.sc input[type=range]{flex:1;height:4px;-webkit-appearance:none;background:var(--g3);border-radius:2px;outline:none}
.sc input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer}
.sc .sv{font-size:11px;color:var(--tx3);width:40px;text-align:right;font-family:var(--fm2)}
/* Terminal */
.t-out{white-space:pre-wrap;word-break:break-all;line-height:1.5;color:var(--tx2);font-family:var(--fm2);font-size:14px}
.t-out .c{color:var(--at)}.t-out .e{color:var(--red)}.t-out .i{color:var(--blu)}.t-out .w{color:var(--yel)}.t-out .s{color:var(--accent)}.t-out .d{color:var(--tx4)}.t-out .a{color:var(--accent);font-weight:600}
.t-p{display:flex;align-items:center;margin-top:4px;font-family:var(--fm2)}.t-ps{color:var(--tp);white-space:nowrap;font-size:14px}
.t-in{flex:1;background:none;border:none;outline:none;color:var(--tx1);font-family:var(--fm2);font-size:14px;caret-color:var(--accent)}
/* Pomo */
.po-w{display:flex;flex-direction:column;align-items:center;padding:6px 0}
.po-rb{position:relative;width:160px;height:160px}.po-rb svg{width:160px;height:160px;transform:rotate(-90deg)}
.po-bg{fill:none;stroke:var(--g3);stroke-width:4}.po-fg{fill:none;stroke:var(--accent);stroke-width:4;stroke-linecap:round;stroke-dasharray:440;stroke-dashoffset:0;transition:stroke-dashoffset .8s linear}
.po-tm{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);font-size:32px;font-weight:700;font-family:var(--fm2)}.po-tm:hover{color:var(--accent)}
.po-ph{position:absolute;top:63%;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--tx3)}
.po-log{display:flex;flex-direction:column;gap:2px;max-height:90px;overflow-y:auto;margin-top:4px}
.po-le{display:flex;justify-content:space-between;padding:3px 6px;background:var(--g2);border-radius:3px;font-size:11px}
.po-edit{position:absolute;inset:0;background:var(--glass);backdrop-filter:blur(12px);display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:5;border-radius:var(--r)}.po-edit.show{display:flex}
/* Login */
.ls{position:fixed;inset:0;z-index:10000;background:var(--g0);display:flex;align-items:center;justify-content:center;transition:opacity .5s,transform .5s}
.ls.out{opacity:0;transform:scale(1.05);pointer-events:none}
.lb{width:360px;background:var(--g1);border:1px solid var(--brd2);border-radius:var(--r);padding:28px;text-align:center;box-shadow:0 20px 80px rgba(0,0,0,.5);animation:fwI .5s cubic-bezier(.16,1,.3,1)}
.ll{font-size:40px;font-weight:700;color:var(--accent);letter-spacing:8px;margin-bottom:2px}
.lsub{font-size:11px;color:var(--tx3);letter-spacing:3px;margin-bottom:20px}
.l-btn{width:100%;padding:10px;background:var(--brd);border:1px solid var(--brdA);border-radius:5px;color:var(--accent);font-size:14px;margin-bottom:6px;transition:all .15s}.l-btn:hover{background:var(--brd2)}
.l-prof{margin-top:12px;border-top:1px solid var(--brd);padding-top:10px}
.l-pb{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;background:var(--g2);border:1px solid var(--brd);border-radius:5px;color:var(--tx2);font-size:12px;margin-bottom:3px;text-align:left;transition:all .12s}.l-pb:hover{border-color:var(--brd2);color:var(--accent)}
/* Overlays */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);z-index:300;display:flex;align-items:center;justify-content:center}
.ov.top{align-items:flex-start;padding-top:16vh}
.ov-p{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--brd2);border-radius:var(--r);padding:18px;width:460px;max-height:75vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.4);animation:fwI .35s cubic-bezier(.16,1,.3,1)}
.ov-t{font-size:16px;font-weight:700;color:var(--accent);margin-bottom:14px;text-align:center;letter-spacing:2px}
.kb-r{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--brd);font-size:12px}
.kb-k{font-size:11px;color:var(--accent);background:var(--g3);padding:2px 8px;border-radius:4px;border:1px solid var(--brd);font-family:var(--fm2)}.kb-d{color:var(--tx2)}
.cap-box{width:460px;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--brd2);border-radius:var(--r);overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4);animation:fwI .35s cubic-bezier(.16,1,.3,1)}
.cap-in{width:100%;padding:14px 16px;background:none;border:none;border-bottom:1px solid var(--brd);color:var(--tx1);font-family:var(--fm);font-size:15px;outline:none}.cap-in::placeholder{color:var(--tx4)}
.cap-ft{display:flex;gap:4px;padding:8px 12px;align-items:center}
.cap-t{padding:4px 12px;border-radius:12px;font-size:11px;border:1px solid var(--brd);color:var(--tx4);transition:all .1s}.cap-t:hover{border-color:var(--brd2);color:var(--tx2)}.cap-t.act{border-color:var(--brdA);color:var(--accent);background:var(--brd)}
.cap-h{margin-left:auto;font-size:10px;color:var(--tx4)}
.pdf-v{width:100%;height:100%;border:none;border-radius:5px;background:#fff}
.hf{position:fixed;top:var(--bar);right:0;z-index:190;width:26px;height:26px;display:flex;align-items:center;justify-content:center;background:var(--brd);border:1px solid var(--brd);border-radius:0 0 0 5px;color:var(--accent);font-size:14px;font-weight:700}
</style>
</head>
<body>
<canvas id="mx"></canvas>
<div class="ls" id="LS"><div class="lb"><div class="ll">NEPT</div><div class="lsub">WORKSPACE</div><div id="lErr" style="font-size:12px;color:var(--red);margin-bottom:6px;min-height:14px"></div><input class="inp" id="lU" placeholder="Username" style="margin-bottom:8px" onkeydown="if(event.key==='Enter')doLogin()"><input class="inp" id="lP" type="password" placeholder="Password" style="margin-bottom:8px" onkeydown="if(event.key==='Enter')doLogin()"><label style="display:flex;align-items:center;gap:6px;margin-bottom:14px;font-size:12px;color:var(--tx3);cursor:pointer"><input type="checkbox" id="lR" checked style="accent-color:var(--accent)">Stay signed in</label><button class="l-btn" onclick="doLogin()">Sign In</button><button class="l-btn" style="background:none;border-color:var(--brd)" onclick="doCreate()">Create Profile</button><div class="l-prof" id="lProf"></div></div></div>
<div class="app" id="app">
<div class="taskbar"><div class="tb-logo"><div class="tb-lg">N</div><span class="tb-ln">NEPT</span></div><div class="tb-w" id="tbW"></div>
<div class="dd"><button class="dd-b" onclick="tDD(this)">System ▾</button><div class="dd-m"><button class="dd-i" onclick="oW('settings');cDD()">⚙ Settings</button><button class="dd-i" onclick="oW('vault');cDD()">🗄 Vault</button><div class="dd-s"></div><button class="dd-i" onclick="toggleMode();cDD()" id="modeBtn">☀ Light Mode</button><div class="dd-s"></div><button class="dd-i" onclick="signOut();cDD()">⏻ Sign Out</button></div></div>
<div class="dd"><button class="dd-b" onclick="tDD(this)">Workspace ▾</button><div class="dd-m"><button class="dd-i" onclick="oW('tasks');cDD()">☐ Tasks</button><button class="dd-i" onclick="oW('matrix');cDD()">◫ Matrix</button><button class="dd-i" onclick="oW('kanban');cDD()">▦ Kanban</button><button class="dd-i" onclick="oW('planner');cDD()">▤ Planner</button><button class="dd-i" onclick="oW('calendar');cDD()">📅 Calendar</button></div></div>
<div class="dd"><button class="dd-b" onclick="tDD(this)">Create ▾</button><div class="dd-m"><button class="dd-i" onclick="oW('notes');cDD()">✎ Notes</button><button class="dd-i" onclick="oW('flashcards');cDD()">◇ Cards</button><button class="dd-i" onclick="oW('scratchpad');cDD()">▧ Scratch</button></div></div>
<div class="dd"><button class="dd-b" onclick="tDD(this)">Tools ▾</button><div class="dd-m"><button class="dd-i" onclick="oW('pomodoro');cDD()">◉ Pomodoro</button><button class="dd-i" onclick="oW('analytics');cDD()">◆ Analytics</button><button class="dd-i" onclick="oW('terminal');cDD()">▸ Terminal</button><button class="dd-i" onclick="oW('browser');cDD()">🌐 Browser</button></div></div>

</div>

</div>

<div class="ov top" id="capOv" style="display:none" onclick="if(event.target===this)closeCap()"><div class="cap-box"><input class="cap-in" id="capIn" placeholder="Quick capture..." onkeydown="if(event.key==='Enter')submitCap()"><div class="cap-ft"><button class="cap-t act" onclick="setCapT('task',this)">Task</button><button class="cap-t" onclick="setCapT('note',this)">Note</button><button class="cap-t" onclick="setCapT('kanban',this)">Kanban</button><button class="cap-t" onclick="setCapT('card',this)">Card</button><span class="cap-h">Enter ↵ · Esc</span></div></div></div>
<input type="file" id="fileIn" style="display:none" onchange="handleFile(event)">

<script>
// ═══ I kept this file long but readable. Every section is labeled. ═══

// --- GREETINGS (randomized on each login) ---
const GR=['Welcome back','Salutations','Bienvenue','Willkommen','Bienvenido','Bentornato','Välkommen','いらっしゃい','Bem-vindo','Aloha','Hey there','Hola','Bonjour','こんにちは','Hej','Merhaba'];
const rg=n=>GR[Math.floor(Math.random()*GR.length)]+', <b>'+n+'</b>';

// --- IndexedDB (replaces localStorage — much bigger quota, async) ---
let db;const DBO=indexedDB.open('nept',1);
DBO.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('profiles'))d.createObjectStore('profiles',{keyPath:'username'});if(!d.objectStoreNames.contains('prefs'))d.createObjectStore('prefs',{keyPath:'key'})};
DBO.onsuccess=e=>{db=e.target.result;showLogin()};
DBO.onerror=()=>{console.error('IndexedDB failed, falling back');showLogin()};

function idbGet(store,key){return new Promise((res,rej)=>{if(!db)return res(null);const tx=db.transaction(store,'readonly');const r=tx.objectStore(store).get(key);r.onsuccess=()=>res(r.result);r.onerror=()=>res(null)})}
function idbPut(store,val){return new Promise((res,rej)=>{if(!db)return res();const tx=db.transaction(store,'readwrite');tx.objectStore(store).put(val);tx.oncomplete=()=>res();tx.onerror=()=>res()})}
function idbDel(store,key){return new Promise(res=>{if(!db)return res();const tx=db.transaction(store,'readwrite');tx.objectStore(store).delete(key);tx.oncomplete=()=>res()})}
function idbAll(store){return new Promise(res=>{if(!db)return res([]);const tx=db.transaction(store,'readonly');const r=tx.objectStore(store).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>res([])})}

// --- STATE ---
let CU=null,S=null;
function freshS(){return{tasks:[],kanban:{backlog:[],todo:[],doing:[],done:[]},notes:[],curNote:0,planner:{},pomoSessions:0,pomoTotalMin:0,tasksDone:0,pomoLog:[],pomoTimes:{focus:25,short:5,long:15},heatmap:Array(28).fill(0),scratchpad:'',flashcards:[],decks:['General'],fcIdx:0,fcDeck:'all',theme:'matrix',mode:'dark',colors:{accent:'#87FF65',accentText:'#87FF65',mainText:'#e8e8e8',background:'#0a0a0a',titlebar:'#171717',termPrompt:'#87FF65',highlight:'#87FF6530'},bgImage:null,vault:[],winAlpha:90,uiScale:100,fontSize:16,menuStyle:'lower',keybinds:{capture:'Ctrl+Space',focus:'Ctrl+F',help:'?'},calEvents:[],gcalUrl:'',pomoNote:''}}
function migrateS(s){const d=freshS();const r={...d,...s};if(!r.colors)r.colors=d.colors;else r.colors={...d.colors,...r.colors};if(!r.keybinds)r.keybinds=d.keybinds;if(!r.decks)r.decks=['General'];if(r.uiScale===undefined)r.uiScale=100;if(r.fontSize===undefined)r.fontSize=16;if(!r.menuStyle)r.menuStyle='lower';if(!r.pomoNote)r.pomoNote='';if(!r.kanban)r.kanban=d.kanban;if(!r.calEvents)r.calEvents=[];if(!r.gcalUrl)r.gcalUrl='';r.flashcards?.forEach(c=>{if(!c.deck)c.deck='General'});r.tasks?.forEach(t=>{if(!t.subtasks)t.subtasks=[];if(!t.due)t.due=null;if(!t.estimate)t.estimate=null});return r}
async function save(){if(!CU)return;await idbPut('profiles',{username:CU,data:S})}

// --- AUTH ---
async function showLogin(){document.getElementById('LS').classList.remove('out');document.getElementById('app').classList.remove('show');const all=await idbAll('profiles');const pp=document.getElementById('lProf');pp.innerHTML=all.map(p=>`<button class="l-pb" onclick="qLogin('${p.username}')"><span style="width:20px;height:20px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--g0)">${p.username[0].toUpperCase()}</span>${p.username}</button>`).join('');const auto=await idbGet('prefs','autoLogin');if(auto?.value){const p=await idbGet('profiles',auto.value);if(p)enter(auto.value,p.data)}}
async function doLogin(){const u=document.getElementById('lU').value.trim(),pw=document.getElementById('lP').value;if(!u)return void(document.getElementById('lErr').textContent='Enter username');const p=await idbGet('profiles',u);if(!p)return void(document.getElementById('lErr').textContent='Not found. Use Create.');if(p.pw&&p.pw!==pw)return void(document.getElementById('lErr').textContent='Wrong password');enter(u,p.data)}
async function doCreate(){const u=document.getElementById('lU').value.trim(),pw=document.getElementById('lP').value;if(!u)return void(document.getElementById('lErr').textContent='Enter username');const p=await idbGet('profiles',u);if(p)return void(document.getElementById('lErr').textContent='Already exists.');await idbPut('profiles',{username:u,pw,data:null});enter(u,null)}
async function qLogin(u){const p=await idbGet('profiles',u);if(p)enter(u,p.data)}
async function enter(u,data){CU=u;S=data?migrateS(data):freshS();if(document.getElementById('lR')?.checked)await idbPut('prefs',{key:'autoLogin',value:u});document.getElementById('LS').classList.add('out');setTimeout(()=>{document.getElementById('app').classList.add('show');initApp()},400)}
async function signOut(){await save();await idbDel('prefs','autoLogin');CU=null;document.querySelectorAll('.fw').forEach(e=>e.remove());showLogin()}

// --- MATRIX RAIN ---
(()=>{const c=document.getElementById('mx'),x=c.getContext('2d');let w,h,co,dr;function rs(){w=c.width=innerWidth;h=c.height=innerHeight;co=Math.floor(w/14);dr=Array(co).fill(1)}rs();addEventListener('resize',rs);const ch='01アイウエオカキク';(function d(){x.fillStyle=S?.mode==='light'?'rgba(244,244,242,.08)':'rgba(10,10,10,.05)';x.fillRect(0,0,w,h);x.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#87FF65';x.font='12px Share Tech Mono';for(let i=0;i<co;i++){x.fillText(ch[Math.floor(Math.random()*ch.length)],i*14,dr[i]*14);if(dr[i]*14>h&&Math.random()>.975)dr[i]=0;dr[i]++}setTimeout(d,50)})()})();

// --- THEMES ---
const TH={matrix:{n:'Matrix',a:'#87FF65'},cyber:{n:'Cyber',a:'#65d4ff'},ember:{n:'Ember',a:'#ff6b4a'},vapor:{n:'Vapor',a:'#c87fff'},mono:{n:'Mono',a:'#aaa'},gold:{n:'Gold',a:'#ffc857'},ocean:{n:'Ocean',a:'#4ac2c8'},rose:{n:'Rose',a:'#ff6b8a'}};
function hexRgb(h){h=h.replace('#','');return{r:parseInt(h.substr(0,2),16),g:parseInt(h.substr(2,2),16),b:parseInt(h.substr(4,2),16)}}
function lighten(h,a){const{r,g,b}=hexRgb(h);return'#'+[r,g,b].map(v=>Math.min(255,v+a).toString(16).padStart(2,'0')).join('')}
function hexA(h,a){const{r,g,b}=hexRgb(h);return`rgba(${r},${g},${b},${a})`}
function applyTheme(name){
  if(name!=='custom'){const t=TH[name]||TH.matrix;S.colors.accent=t.a;S.colors.accentText=t.a;S.colors.termPrompt=t.a}
  const st=document.documentElement.style;const{r,g,b}=hexRgb(S.colors.accent);
  document.documentElement.setAttribute('data-mode',S.mode);
  st.setProperty('--accent',S.colors.accent);st.setProperty('--at',S.colors.accentText);st.setProperty('--tp',S.colors.termPrompt);
  st.setProperty('--brd',`rgba(${r},${g},${b},.06)`);st.setProperty('--brd2',`rgba(${r},${g},${b},.14)`);st.setProperty('--brdA',`rgba(${r},${g},${b},.25)`);
  if(S.mode==='dark'){const bg=S.colors.background||'#0a0a0a';st.setProperty('--g0',bg);st.setProperty('--g1',lighten(bg,6));st.setProperty('--g2',lighten(bg,12));st.setProperty('--g3',lighten(bg,18));
  const tx=hexRgb(S.colors.mainText||'#e8e8e8');st.setProperty('--tx1',S.colors.mainText||'#e8e8e8');
  st.setProperty('--tx2',`rgb(${Math.round(tx.r*.6)},${Math.round(tx.g*.6)},${Math.round(tx.b*.6)})`);
  st.setProperty('--tx3',`rgb(${Math.round(tx.r*.4)},${Math.round(tx.g*.4)},${Math.round(tx.b*.4)})`);
  st.setProperty('--tx4',`rgb(${Math.round(tx.r*.25)},${Math.round(tx.g*.25)},${Math.round(tx.b*.25)})`);
  st.setProperty('--glass',hexA(bg,.9));st.setProperty('--tb',S.colors.titlebar||lighten(bg,12))}
  else{st.setProperty('--g0','#f4f4f2');st.setProperty('--g1','#ebebea');st.setProperty('--g2','#e1e1df');st.setProperty('--g3','#d7d7d5');
  const lt=hexRgb(S.colors.mainText||'#1a1a1a');st.setProperty('--tx1',S.colors.mainText||'#1a1a1a');
  const mx=(c,t,a)=>Math.round(c+(t-c)*a);st.setProperty('--tx2',`rgb(${mx(lt.r,200,.5)},${mx(lt.g,200,.5)},${mx(lt.b,200,.5)})`);
  st.setProperty('--tx3',`rgb(${mx(lt.r,200,.7)},${mx(lt.g,200,.7)},${mx(lt.b,200,.7)})`);
  st.setProperty('--tx4',`rgb(${mx(lt.r,200,.85)},${mx(lt.g,200,.85)},${mx(lt.b,200,.85)})`);
  st.setProperty('--glass','rgba(244,244,242,.88)');st.setProperty('--tb','#e1e1df')}
  if(S.bgImage){document.body.style.backgroundImage=`url(${S.bgImage})`;document.body.classList.add('has-bg')}else{document.body.style.backgroundImage='none';document.body.classList.remove('has-bg')}
  document.documentElement.style.fontSize=S.uiScale+'%';
  document.body.style.setProperty('--base-fs',S.fontSize+'px');
  document.querySelectorAll('.fw').forEach(el=>{el.style.background=S.mode==='light'?`rgba(235,235,234,${S.winAlpha/100})`:hexA(S.colors.background||'#0a0a0a',S.winAlpha/100)});
  S.theme=name;save();document.title=`NEPT — ${CU}`;
  document.getElementById('modeBtn').textContent=S.mode==='light'?'🌙 Dark Mode':'☀ Light Mode'}
function toggleMode(){S.mode=S.mode==='dark'?'light':'dark';save();applyTheme(S.theme)}

// --- CLOCK ---
setInterval(()=>{const e=document.getElementById('clk');if(e)e.textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})},1000);

// --- DROPDOWNS ---
function tDD(b){const m=b.nextElementSibling;const o=m.classList.contains('show');cDD();if(!o){m.classList.add('show');b.classList.add('open')}}
function cDD(){document.querySelectorAll('.dd-m').forEach(m=>m.classList.remove('show'));document.querySelectorAll('.dd-b').forEach(b=>b.classList.remove('open'))}
document.addEventListener('click',e=>{if(!e.target.closest('.dd'))cDD()});

// --- WINDOW SYSTEM ---
const W={terminal:{l:'Terminal',o:true,x:20,y:20,w:540,h:400,r:rTerm},pomodoro:{l:'Pomodoro',o:true,x:580,y:20,w:340,h:480,r:rPomo},tasks:{l:'Tasks',o:false,x:40,y:60,w:440,h:420,r:rTasks},matrix:{l:'Matrix',o:false,x:460,y:80,w:500,h:380,r:rMx},kanban:{l:'Kanban',o:false,x:60,y:40,w:660,h:380,r:rKanban},notes:{l:'Notes',o:false,x:80,y:50,w:560,h:420,r:rNotes},planner:{l:'Planner',o:false,x:100,y:30,w:400,h:440,r:rPlanner},calendar:{l:'Calendar',o:false,x:120,y:50,w:460,h:500,r:rCal},analytics:{l:'Analytics',o:false,x:140,y:60,w:460,h:380,r:rAnalytics},scratchpad:{l:'Scratch',o:false,x:160,y:80,w:400,h:340,r:rScratch},flashcards:{l:'Cards',o:false,x:200,y:40,w:400,h:500,r:rFC},settings:{l:'Settings',o:false,x:180,y:50,w:480,h:540,r:rSettings},vault:{l:'Vault',o:false,x:200,y:40,w:440,h:440,r:rVault},browser:{l:'Browser',o:false,x:60,y:30,w:800,h:520,r:rBrowser}};
let topZ=50,pdfC=0;
function oW(id){if(!W[id])return;if(!W[id].o){W[id].o=true;spawnW(id)}focW(id)}
function cW(id){if(!W[id])return;W[id].o=false;const el=document.getElementById('fw-'+id);if(el){el.style.opacity='0';el.style.transform='scale(.92) translateY(8px)';setTimeout(()=>el.remove(),300)}if(id.startsWith('pdf_'))delete W[id]}
function spawnW(id){const v=W[id],ws=document.getElementById('ws');const bg=S.mode==='light'?`rgba(235,235,234,${S.winAlpha/100})`:hexA(S.colors.background||'#0a0a0a',S.winAlpha/100);
const el=document.createElement('div');el.className='fw';el.id='fw-'+id;el.style.cssText=`left:${v.x}px;top:${v.y}px;width:${v.w}px;height:${v.h}px;background:${bg};transition:opacity .3s,transform .3s`;
el.innerHTML=`<div class="rh rh-n" data-d="n" data-w="${id}"></div><div class="rh rh-s" data-d="s" data-w="${id}"></div><div class="rh rh-w" data-d="w" data-w="${id}"></div><div class="rh rh-e" data-d="e" data-w="${id}"></div><div class="rh rh-nw" data-d="nw" data-w="${id}"></div><div class="rh rh-ne" data-d="ne" data-w="${id}"></div><div class="rh rh-sw" data-d="sw" data-w="${id}"></div><div class="rh rh-se" data-d="se" data-w="${id}"></div><div class="fw-t" data-wid="${id}"><div class="fw-d"><button class="fw-dot dot-r" onclick="event.stopPropagation();cW('${id}')" aria-label="Close"></button><button class="fw-dot dot-y" onclick="event.stopPropagation();cW('${id}')" aria-label="Minimize"></button><button class="fw-dot dot-g" onclick="event.stopPropagation();maxW('${id}')" aria-label="Maximize"></button></div><span class="fw-tl">${v.l}</span></div><div class="fw-b"><div class="fw-in" id="b-${id}"></div></div>`;
ws.appendChild(el);v.r();focW(id)}
function maxW(id){const el=document.getElementById('fw-'+id),ws=document.getElementById('ws');if(!el)return;if(el.dataset.max==='1'){el.classList.add('snap');el.style.left=el.dataset.ol+'px';el.style.top=el.dataset.ot+'px';el.style.width=el.dataset.ow+'px';el.style.height=el.dataset.oh+'px';el.dataset.max='0';setTimeout(()=>el.classList.remove('snap'),300)}else{el.dataset.ol=parseInt(el.style.left);el.dataset.ot=parseInt(el.style.top);el.dataset.ow=el.offsetWidth;el.dataset.oh=el.offsetHeight;el.classList.add('snap');el.style.left='0';el.style.top='0';el.style.width=ws.clientWidth+'px';el.style.height=ws.clientHeight+'px';el.dataset.max='1';setTimeout(()=>el.classList.remove('snap'),300)}focW(id)}
function focW(id){document.querySelectorAll('.fw').forEach(w=>w.classList.remove('foc'));const el=document.getElementById('fw-'+id);if(el){el.classList.add('foc');el.style.zIndex=++topZ}if(id==='terminal')setTimeout(()=>document.getElementById('tIn')?.focus(),60);if(focusMode)updateDim()}
// Drag
(()=>{let dg=null,ox,oy;const SN=30;document.addEventListener('mousedown',e=>{const tb=e.target.closest('.fw-t');if(!tb||e.target.closest('.fw-d'))return;const wid=tb.dataset.wid;const el=document.getElementById('fw-'+wid);if(!el||el.dataset.max==='1')return;dg={el,wid};const r=el.getBoundingClientRect();ox=e.clientX-r.left;oy=e.clientY-r.top;focW(wid);e.preventDefault()});
document.addEventListener('mousemove',e=>{if(!dg)return;const ws=document.getElementById('ws'),wr=ws.getBoundingClientRect();dg.el.style.left=(e.clientX-wr.left-ox)+'px';dg.el.style.top=(e.clientY-wr.top-oy)+'px';const sg=document.getElementById('snapG');if(e.clientX<wr.left+SN)sg.style.cssText=`display:block;left:0;top:0;width:${wr.width/2}px;height:${wr.height}px`;else if(e.clientX>wr.right-SN)sg.style.cssText=`display:block;left:${wr.width/2}px;top:0;width:${wr.width/2}px;height:${wr.height}px`;else if(e.clientY<wr.top+SN+34)sg.style.cssText=`display:block;left:0;top:0;width:${wr.width}px;height:${wr.height}px`;else sg.style.display='none'});

let tH=[],tHi=-1;const MOTD=`<span class="a"> ███╗  ██╗███████╗██████╗ ████████╗\n ████╗ ██║██╔════╝██╔══██╗╚══██╔══╝\n ██╔██╗██║█████╗  ██████╔╝   ██║\n ██║╚████║██╔══╝  ██╔═══╝    ██║\n ██║ ╚███║███████╗██║        ██║\n ╚═╝  ╚══╝╚══════╝╚═╝        ╚═╝</span>\n<span class="d">──────────────────────────────────</span>\n <span class="d">Type</span> <span class="c">help</span> <span class="d">· Press</span> <span class="c">?</span>\n<span class="d">──────────────────────────────────</span>\n`;
let tBuf=MOTD;
function rTerm(){const el=document.getElementById('b-terminal');if(!el)return;el.innerHTML=`<div class="t-out" id="tOut">${tBuf}</div><div class="t-p"><span class="t-ps"><span style="color:var(--at)">${CU||'user'}</span><span style="color:var(--tx3)">@nept</span> <span style="color:var(--blu)">~</span> <span style="color:var(--tp)">❯</span> </span><input class="t-in" id="tIn" spellcheck="false" onkeydown="tKey(event)"></div>`;const o=document.getElementById('tOut');if(o)o.scrollTop=o.scrollHeight;document.getElementById('tIn')?.focus()}
function tKey(e){if(e.key==='Enter'){const v=document.getElementById('tIn').value.trim();if(v){tH.unshift(v);tHi=-1;exec(v)}document.getElementById('tIn').value=''}else if(e.key==='ArrowUp'){e.preventDefault();if(tHi<tH.length-1)document.getElementById('tIn').value=tH[++tHi]}else if(e.key==='ArrowDown'){e.preventDefault();tHi>0?document.getElementById('tIn').value=tH[--tHi]:(tHi=-1,document.getElementById('tIn').value='')}}
function tO(h){tBuf+=h+'\n';rTerm()}
function esc(s){return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function pQ(r){const m=[];const re=/"([^"]*)"|(\S+)/g;let x;while((x=re.exec(r))!==null)m.push(x[1]!==undefined?x[1]:x[2]);return m}
function exec(raw){tO(`<span class="d">❯</span> <span class="c">${esc(raw)}</span>`);const p=pQ(raw);const c=p[0]?.toLowerCase();
if(c==='help')tO(`<span class="i">commands:</span>\n  <span class="c">set task</span> [hi|med|lo] "text"\n  <span class="c">ls tasks</span> · <span class="c">done</span> # · <span class="c">rm task</span> #\n  <span class="c">set card</span> "q" "a" ["deck"]\n  <span class="c">study</span> · <span class="c">import cards</span>\n  <span class="c">set note</span> "title" · <span class="c">set kanban</span> [col] "title"\n  <span class="c">pomo</span> start|stop|reset|set #\n  <span class="c">open|close</span> [window] · <span class="c">theme</span> [name]\n  <span class="c">light</span> · <span class="c">dark</span> · <span class="c">neofetch</span> · <span class="c">clear</span>`);
else if(c==='clear'){tBuf='';rTerm()}
else if(c==='neofetch')tO(`<span class="a">  ${CU}@nept</span>\n  <span class="d">──────────────</span>\n  <span class="i">Theme:</span> ${S.theme} (${S.mode})\n  <span class="i">Tasks:</span> ${S.tasks.length} · <span class="i">Cards:</span> ${S.flashcards.length}\n  <span class="i">Notes:</span> ${S.notes.length} · <span class="i">Vault:</span> ${S.vault.length}\n  <span class="i">Pomo:</span> ${S.pomoSessions} (${S.pomoTotalMin}m)`);
else if(c==='set'&&p[1]?.toLowerCase()==='task'){let pri='med',text='';const p2=(p[2]||'').toLowerCase();if(['high','hi','med','medium','low','lo'].includes(p2)){pri={hi:'high',high:'high',med:'med',medium:'med',lo:'low',low:'low'}[p2]||'med';text=p.slice(3).join(' ')}else text=p.slice(2).join(' ');if(!text)return tO('<span class="e">set task [pri] "text"</span>');S.tasks.unshift({id:Date.now(),text,done:false,pri,q:pri==='high'?1:pri==='med'?2:4,subtasks:[],due:null,estimate:null});save();tO(`<span class="s">✓ "${text}"</span>`);rr('tasks','matrix')}
else if(c==='ls'&&p[1]?.toLowerCase()==='tasks'){if(!S.tasks.length)return tO('<span class="d">empty</span>');S.tasks.forEach((t,i)=>tO(`  ${t.done?'<span class="s">✓</span>':'<span class="d">○</span>'} <span class="d">#${i+1}</span> ${esc(t.text)}`))}
else if(c==='done'){const i=parseInt(p[1])-1;if(isNaN(i)||!S.tasks[i])return;S.tasks[i].done=true;S.tasksDone++;save();tO('<span class="s">✓</span>');rr('tasks','matrix')}
else if(c==='rm'&&p[1]?.toLowerCase()==='task'){const i=parseInt(p[2])-1;if(isNaN(i)||!S.tasks[i])return;S.tasks.splice(i,1);save();tO('<span class="w">✗</span>');rr('tasks','matrix')}
else if(c==='set'&&p[1]?.toLowerCase()==='card'){if(!p[2]||!p[3])return tO('<span class="e">set card "q" "a" ["deck"]</span>');const dk=p[4]||'General';if(!S.decks.includes(dk))S.decks.push(dk);S.flashcards.push({id:Date.now(),q:p[2],a:p[3],deck:dk,ease:2.5,interval:1,due:Date.now()});save();tO(`<span class="s">✓ → ${esc(dk)}</span>`);rr('flashcards')}
else if(c==='study')oW('flashcards');
else if(c==='import'&&p[1]?.toLowerCase()==='cards')document.getElementById('cardFileIn').click();
else if(c==='set'&&p[1]?.toLowerCase()==='note'){const t=p.slice(2).join(' ');if(!t)return;S.notes.unshift({id:Date.now(),title:t,body:'',updated:Date.now()});S.curNote=0;save();tO('<span class="s">✓</span>');rr('notes')}
else if(c==='set'&&p[1]?.toLowerCase()==='kanban'){const col=p[2]?.toLowerCase(),t=p.slice(3).join(' ');if(!['backlog','todo','doing','done'].includes(col)||!t)return;S.kanban[col].push({id:Date.now(),title:t});save();tO('<span class="s">✓</span>');rr('kanban')}

else if(c==='open'){if(p[1]?.toLowerCase()==='document')document.getElementById('fileIn').click();else{const w=p[1]?.toLowerCase();if(W[w])oW(w);else tO('<span class="e">unknown</span>')}}

else if(c==='theme'){const t=p[1]?.toLowerCase();if(TH[t]){applyTheme(t);rr('settings')}else tO(`<span class="e">themes: ${Object.keys(TH).join(', ')}</span>`)}
else if(c==='light'){S.mode='light';save();applyTheme(S.theme)}
else if(c==='dark'){S.mode='dark';save();applyTheme(S.theme)}
else tO(`<span class="e">unknown: ${esc(c)}</span> · <span class="c">help</span>`)}

function handleFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{S.notes.unshift({id:Date.now(),title:'📄 '+f.name,body:ev.target.result,updated:Date.now()});S.curNote=0;save();oW('notes')};r.readAsText(f);e.target.value=''}
function handleCardFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(Array.isArray(d))d.forEach(c=>S.flashcards.push({id:Date.now()+Math.random(),q:c.q||c.front||'',a:c.a||c.back||'',deck:c.deck||S.fcDeck!=='all'?S.fcDeck:'General',ease:2.5,interval:1,due:Date.now()}))}catch(err){ev.target.result.split('\n').filter(l=>l.trim()).forEach(l=>{const p=l.split(/[,\t]/);if(p.length>=2)S.flashcards.push({id:Date.now()+Math.random(),q:p[0].trim(),a:p[1].trim(),deck:S.fcDeck!=='all'?S.fcDeck:'General',ease:2.5,interval:1,due:Date.now()})})}save();rr('flashcards')};r.readAsText(f);e.target.value=''}
function handleBgFile(e){const f=e.target.files[0];if(!f)return;if(f.size>8*1024*1024){alert('Max 8MB');e.target.value='';return}const r=new FileReader();r.onload=ev=>{S.bgImage=ev.target.result;save();applyTheme(S.theme);rr('settings')};r.readAsDataURL(f);e.target.value=''}
function handleVaultFiles(e){Array.from(e.target.files).forEach(f=>{if(f.size>5*1024*1024){alert(f.name+' too large (max 5MB)');return}const r=new FileReader();r.onload=ev=>{S.vault.push({id:Date.now()+Math.random(),name:f.name,size:f.size,type:f.type,data:ev.target.result,added:Date.now()});save();rr('vault')};f.type.startsWith('image')||f.type==='application/pdf'?r.readAsDataURL(f):r.readAsText(f)});e.target.value=''}

// --- POMODORO ---
const CIRC=2*Math.PI*70;let pomo={running:false,mode:'focus',timeLeft:25*60,interval:null};
function getPT(){return S.pomoTimes[pomo.mode]*60}
function updatePUI(){const m=Math.floor(pomo.timeLeft/60),s=pomo.timeLeft%60;const el=document.getElementById('pT');if(el)el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;const r=document.getElementById('pR');if(r)r.style.strokeDashoffset=CIRC*(1-(1-pomo.timeLeft/getPT()))}
function togglePomo(){if(pomo.running){clearInterval(pomo.interval);pomo.running=false}else{
/* Save the note text to state so it persists through the session */
S.pomoNote=document.getElementById('pN')?.value||S.pomoNote||'';save();
pomo.running=true;pomo.interval=setInterval(()=>{pomo.timeLeft--;if(pomo.timeLeft<=0){clearInterval(pomo.interval);pomo.running=false;if(pomo.mode==='focus'){S.pomoSessions++;S.pomoTotalMin+=S.pomoTimes.focus;
/* Use the note from state — it was saved when START was pressed */
const n=S.pomoNote||'';S.pomoLog.unshift({time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),dur:S.pomoTimes.focus,note:n});S.pomoNote='';S.heatmap[27]=Math.min(4,(S.heatmap[27]||0)+1);save()}try{const c=new AudioContext(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=830;g.gain.setValueAtTime(.2,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+1);o.start();o.stop(c.currentTime+1)}catch(e){}setPomoMode(pomo.mode==='focus'?(S.pomoSessions%4===0?'long':'short'):'focus')}updatePUI()},1000)}rPomo()}
function resetPomo(){clearInterval(pomo.interval);pomo.running=false;pomo.timeLeft=getPT();rPomo()}
function setPomoMode(m){pomo.mode=m;pomo.timeLeft=S.pomoTimes[m]*60;pomo.running=false;clearInterval(pomo.interval);rPomo()}
function rPomo(){const el=document.getElementById('b-pomodoro');if(!el)return;el.innerHTML=`<div class="po-edit" id="pE"><div class="sl">Edit Timer</div>${['focus','short','long'].map(k=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><label style="font-size:12px;color:var(--tx2);width:50px">${k}</label><input class="inp" type="number" id="e${k[0].toUpperCase()}" value="${S.pomoTimes[k]}" style="width:50px;text-align:center"></div>`).join('')}<div style="display:flex;gap:4px"><button class="btn btn-a" onclick="S.pomoTimes.focus=parseInt(document.getElementById('eF').value)||25;S.pomoTimes.short=parseInt(document.getElementById('eS').value)||5;S.pomoTimes.long=parseInt(document.getElementById('eL').value)||15;save();pomo.timeLeft=getPT();document.getElementById('pE').classList.remove('show');rPomo()">OK</button><button class="btn" onclick="document.getElementById('pE').classList.remove('show')">✕</button></div></div><div class="po-w"><div class="po-rb"><svg viewBox="0 0 160 160"><circle class="po-bg" cx="80" cy="80" r="70"/><circle class="po-fg" id="pR" cx="80" cy="80" r="70"/></svg><button class="po-tm" id="pT" onclick="if(!pomo.running)document.getElementById('pE').classList.add('show')">--:--</button><div class="po-ph">${{focus:'Focus',short:'Break',long:'Long Break'}[pomo.mode]}</div></div><!-- Note BEFORE controls so you can write before starting --><textarea class="inp" id="pN" placeholder="what are you working on? (write before starting)" style="margin-top:8px;min-height:40px;resize:none;font-size:12px;width:100%;max-width:240px" oninput="S.pomoNote=this.value;save()">${esc(S.pomoNote||'')}</textarea><div style="display:flex;gap:6px;margin-top:8px"><button class="btn btn-a" onclick="togglePomo()">${pomo.running?'PAUSE':'START'}</button><button class="btn" onclick="resetPomo()">RESET</button><button class="btn" onclick="clearInterval(pomo.interval);pomo.running=false;setPomoMode(pomo.mode==='focus'?'short':'focus')">SKIP</button></div><div class="tab-bar" style="margin-top:8px;width:200px">${['focus','short','long'].map(m=>`<button class="tab ${pomo.mode===m?'act':''}" onclick="setPomoMode('${m}')">${m==='focus'?'Focus':m==='short'?'Short':'Long'}</button>`).join('')}</div><div style="display:flex;gap:5px;margin-top:8px">${[0,1,2,3].map(i=>`<div style="width:7px;height:7px;border-radius:50%;background:${i<S.pomoSessions%4?'var(--accent)':'var(--g3)'};border:1px solid ${i<S.pomoSessions%4?'var(--accent)':'var(--tx4)'}"></div>`).join('')}</div></div><div class="sl">Log</div><div class="po-log">${S.pomoLog.slice(0,6).map(e=>`<div class="po-le"><div><span style="color:var(--accent)">●</span> ${e.dur}m${e.note?` <span style="color:var(--tx4)">— ${esc(e.note)}</span>`:''}</div><span style="color:var(--tx4)">${e.time}</span></div>`).join('')}</div>`;updatePUI()}

// --- TASKS (with subtasks, due dates, estimates) ---
function rTasks(){const el=document.getElementById('b-tasks');if(!el)return;el.innerHTML=`<div style="display:flex;gap:4px;margin-bottom:6px"><input class="inp" id="tI" placeholder="new task..." onkeydown="if(event.key==='Enter')addTG()" style="flex:1"><select class="inp" id="tP" style="width:65px;font-size:12px" aria-label="Priority"><option value="high">high</option><option value="med" selected>med</option><option value="low">low</option></select><button class="btn btn-a" onclick="addTG()" aria-label="Add task">+</button></div><div style="display:flex;gap:4px;margin-bottom:8px"><input type="date" class="inp" id="tDue" style="flex:1;font-size:11px" aria-label="Due date"><input class="inp" id="tEst" placeholder="estimate (30m, 2h)" style="width:140px;font-size:11px" aria-label="Estimate"></div>${S.tasks.length?S.tasks.map((t,idx)=>`<div class="ti"><button class="tchk ${t.done?'dn':''}" onclick="tgl(${t.id})" aria-label="${t.done?'Uncheck':'Check'}"></button><div style="flex:1;min-width:0"><div class="ttxt ${t.done?'dn':''}">${esc(t.text)}</div><div class="tmeta"><span class="badge b-${t.pri==='high'?'hi':t.pri==='med'?'md':'lo'}">${t.pri}</span>${t.due?`<span style="color:var(--blu)">📅 ${t.due}</span>`:''}${t.estimate?`<span>⏱ ${esc(t.estimate)}</span>`:''}
<button style="font-size:10px;padding:1px 6px;color:var(--tx3)" onclick="toggleSubI(${t.id})">+ sub</button><button style="font-size:10px;color:var(--red);opacity:.5;margin-left:auto" onclick="rmTask(${t.id})" aria-label="Delete">✕</button></div>${t.subtasks?.length?`<div class="subs">${t.subtasks.map(s=>`<div class="sub-i"><button class="sub-c ${s.done?'dn':''}" onclick="tglSub(${t.id},${s.id})" aria-label="${s.done?'Uncheck':'Check'} subtask"></button><span style="${s.done?'text-decoration:line-through;color:var(--tx4)':''}">${esc(s.text)}</span></div>`).join('')}</div>`:''}<div id="subI-${t.id}" style="display:none;margin-top:4px"><div style="display:flex;gap:4px"><input class="inp" id="subIn-${t.id}" placeholder="subtask..." style="font-size:12px" onkeydown="if(event.key==='Enter')addSub(${t.id})"><button class="btn btn-a btn-s" onclick="addSub(${t.id})">+</button></div></div></div></div>`).join(''):'<div style="color:var(--tx4);font-size:12px;padding:10px">no tasks yet</div>'}`}
function addTG(){const i=document.getElementById('tI');if(!i?.value.trim())return;const p=document.getElementById('tP').value;const d=document.getElementById('tDue').value;const e=document.getElementById('tEst').value;S.tasks.unshift({id:Date.now(),text:i.value.trim(),done:false,pri:p,q:p==='high'?1:p==='med'?2:4,subtasks:[],due:d||null,estimate:e||null});i.value='';document.getElementById('tDue').value='';document.getElementById('tEst').value='';save();rTasks();rr('matrix','calendar')}
function tgl(id){const t=S.tasks.find(x=>x.id===id);if(t){t.done=!t.done;if(t.done)S.tasksDone++;save();rTasks();rr('matrix')}}
function rmTask(id){S.tasks=S.tasks.filter(t=>t.id!==id);save();rTasks();rr('matrix','calendar')}
function toggleSubI(id){const el=document.getElementById('subI-'+id);if(el){el.style.display=el.style.display==='none'?'block':'none';if(el.style.display==='block')document.getElementById('subIn-'+id)?.focus()}}
function addSub(tid){const inp=document.getElementById('subIn-'+tid);if(!inp?.value.trim())return;const t=S.tasks.find(x=>x.id===tid);if(t){if(!t.subtasks)t.subtasks=[];t.subtasks.push({id:Date.now(),text:inp.value.trim(),done:false});inp.value='';save();rTasks()}}
function tglSub(tid,sid){const t=S.tasks.find(x=>x.id===tid);if(t){const s=t.subtasks?.find(x=>x.id===sid);if(s){s.done=!s.done;save();rTasks()}}}

let kD=null;
function rKanban(){const el=document.getElementById('b-kanban');if(!el)return;el.innerHTML=`<div class="kb-board">${['backlog','todo','doing','done'].map(c=>`<div class="kb-col"><div class="kb-h"><span class="kb-n">${c==='todo'?'To Do':c==='doing'?'In Progress':c[0].toUpperCase()+c.slice(1)} <span class="kb-cnt">${(S.kanban[c]||[]).length}</span></span>${c!=='done'?`<button class="btn btn-s" onclick="addKB('${c}')">+</button>`:''}</div><div class="kb-cards" ondragover="event.preventDefault()" ondrop="dKB('${c}')">${(S.kanban[c]||[]).map(cd=>`<div class="kb-cd" draggable="true" ondragstart="kD={id:${cd.id},from:'${c}'}">${esc(cd.title)}</div>`).join('')}</div></div>`).join('')}</div>`}
function addKB(c){const w=document.querySelector(`[ondrop="dKB('${c}')"]`);if(!w)return;const ex=w.querySelector('.kb-add-in');if(ex){ex.focus();return}const inp=document.createElement('input');inp.className='inp kb-add-in';inp.placeholder='card title...';inp.style.cssText='font-size:12px;margin-bottom:4px';inp.onkeydown=e=>{if(e.key==='Enter'&&inp.value.trim()){S.kanban[c].push({id:Date.now(),title:inp.value.trim()});save();rKanban()}if(e.key==='Escape')inp.remove()};inp.onblur=()=>{if(!inp.value.trim())inp.remove()};w.prepend(inp);inp.focus()}
function dKB(to){if(!kD)return;let cd;for(const c of Object.keys(S.kanban)){const i=S.kanban[c].findIndex(x=>x.id===kD.id);if(i>=0){cd=S.kanban[c].splice(i,1)[0];break}}if(cd){S.kanban[to].push(cd);save();rKanban()}kD=null}

function rNotes(){const el=document.getElementById('b-notes');if(!el)return;const notes=S.notes||[];const ci=S.curNote||0;const cur=notes[ci];const backlinks=cur?.title?notes.filter((n,i)=>i!==ci&&n.body?.includes(`[[${cur.title}]]`)):[];
el.innerHTML=`<div style="display:flex;gap:8px;height:100%"><div style="width:130px;flex-shrink:0"><button class="btn btn-a btn-s" style="width:100%;margin-bottom:4px" onclick="newNote()">+ new</button><div class="nl">${notes.map((n,i)=>`<button class="ni ${i===ci?'act':''}" onclick="selNote(${i})">${esc(n.title||'untitled')}</button>`).join('')}</div></div><div style="flex:1;display:flex;flex-direction:column">${cur?`<input class="inp" id="nT" value="${esc(cur.title||'')}" placeholder="title..." style="margin-bottom:4px;font-size:16px;font-weight:700" oninput="updNoteT(this.value)"><div style="font-size:9px;color:var(--tx4);margin-bottom:4px">Use [[Title]] for backlinks</div><textarea class="inp" id="nB" placeholder="start typing..." style="flex:1;min-height:160px;line-height:1.6;font-size:13px;resize:none" oninput="updNoteB(this.value)">${esc(cur.body||'')}</textarea><div style="display:flex;justify-content:space-between;margin-top:6px"><button class="btn btn-a btn-s" onclick="saveNoteExplicit()">💾 Save Note</button><button class="btn btn-d btn-s" style="opacity:.6" onclick="delNote()">delete</button></div>${backlinks.length?`<div style="margin-top:6px"><div class="sl">Backlinks</div><div style="display:flex;gap:4px;flex-wrap:wrap">${backlinks.map(bl=>{const i=notes.indexOf(bl);return`<button class="btn btn-s" style="color:var(--accent)" onclick="selNote(${i})">${esc(bl.title)}</button>`}).join('')}</div></div>`:''}`:'<div style="color:var(--tx4);padding:20px;text-align:center">click + new to start writing</div>'}</div></div>`}
function newNote(){
/* Create an empty note — user fills in title and body, then saves */
S.notes.unshift({id:Date.now(),title:'',body:'',updated:Date.now()});S.curNote=0;save();rNotes();setTimeout(()=>document.getElementById('nT')?.focus(),50)}
function saveNoteExplicit(){
/* Explicit save: reads current input values into the note object */
const t=document.getElementById('nT')?.value||'';const b=document.getElementById('nB')?.value||'';
if(S.notes[S.curNote]){S.notes[S.curNote].title=t;S.notes[S.curNote].body=b;S.notes[S.curNote].updated=Date.now();save();rNotes()}}
function selNote(i){S.curNote=i;save();rNotes()}
function updNoteT(v){if(S.notes[S.curNote]){S.notes[S.curNote].title=v;save()}}
function updNoteB(v){if(S.notes[S.curNote]){S.notes[S.curNote].body=v;save()}}
function delNote(){if(!S.notes[S.curNote])return;S.notes.splice(S.curNote,1);S.curNote=Math.max(0,S.curNote-1);save();rNotes()}

let calDate=new Date();let calSelDay=null;
function rCal(){const el=document.getElementById('b-calendar');if(!el)return;if(!S.calEvents)S.calEvents=[];const y=calDate.getFullYear(),mo=calDate.getMonth();const today=new Date();const first=new Date(y,mo,1).getDay();const days=new Date(y,mo+1,0).getDate();const prev=new Date(y,mo,0).getDate();
// Gather events for this month — compare by string prefix to avoid timezone bugs
const moPrefix=y+'-'+String(mo+1).padStart(2,'0');
const eventDates={};
S.calEvents.forEach(ev=>{
  if(ev.date&&ev.date.startsWith(moPrefix)){
    const day=parseInt(ev.date.split('-')[2]);
    if(!eventDates[day])eventDates[day]=[];
    eventDates[day].push(ev)}});
S.tasks.filter(t=>t.due).forEach(t=>{
  if(t.due.startsWith(moPrefix)){
    const day=parseInt(t.due.split('-')[2]);
    if(!eventDates[day])eventDates[day]=[];
    eventDates[day].push({id:t.id,title:'📋 '+t.text,date:t.due,time:'',alert:false,type:'task'})}});
let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><button class="btn btn-s" onclick="calDate.setMonth(calDate.getMonth()-1);rCal()">←</button><span style="font-size:14px;font-weight:700">${calDate.toLocaleDateString('en-US',{month:'long',year:'numeric'})}</span><button class="btn btn-s" onclick="calDate.setMonth(calDate.getMonth()+1);rCal()">→</button></div>`;
// Google Calendar connect + quick add
html+=`<div style="display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap"><button class="btn btn-s" onclick="promptGCal()">📅 Google Calendar</button><button class="btn btn-s" onclick="document.getElementById('icsFileIn').click()">Import .ics</button></div>`;
// Quick add event (always visible — no need to click a day first)
html+=`<div style="padding:8px;background:var(--g2);border-radius:5px;border:1px solid var(--brd);margin-bottom:8px"><div style="font-size:11px;color:var(--tx2);margin-bottom:4px">Quick add event</div><div style="display:flex;gap:4px;flex-wrap:wrap"><input class="inp" id="calQTitle" placeholder="event title..." style="flex:1;min-width:120px;font-size:12px"><input type="date" class="inp" id="calQDate" style="width:130px;font-size:11px"><input type="time" class="inp" id="calQTime" style="width:90px;font-size:11px"><label style="display:flex;align-items:center;gap:3px;font-size:10px;color:var(--tx3)"><input type="checkbox" id="calQAlert" style="accent-color:var(--accent)">🔔</label><button class="btn btn-a btn-s" onclick="quickAddCalEv()">Add</button></div></div>`;
html+=`<div class="cal-g">`;
['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>html+=`<div class="cal-h">${d}</div>`);
for(let i=first-1;i>=0;i--)html+=`<div class="cal-d other">${prev-i}</div>`;
for(let d=1;d<=days;d++){const isToday=d===today.getDate()&&mo===today.getMonth()&&y===today.getFullYear();const hasEv=!!eventDates[d];const isSel=calSelDay===d;
html+=`<button class="cal-d ${isToday?'today':''} ${hasEv?'has-t':''}" onclick="calClickDay(${d})" style="${isSel?'outline:2px solid var(--accent);outline-offset:-2px;border-radius:4px':''}">${d}</button>`}
const rem=42-(first+days);for(let d=1;d<=rem;d++)html+=`<div class="cal-d other">${d}</div>`;
html+='</div>';
// Selected day detail panel
if(calSelDay){
const selMo=String(mo+1).padStart(2,'0');
const selDy=String(calSelDay).padStart(2,'0');
const selDate=y+'-'+selMo+'-'+selDy;
const dayEvents=(eventDates[calSelDay]||[]);
html+=`<div style="margin-top:10px;padding:10px;background:var(--g2);border-radius:5px;border:1px solid var(--brd)">`;
html+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:13px;font-weight:700">${new Date(y,mo,calSelDay).toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}</span><button class="btn btn-s" onclick="calSelDay=null;rCal()">✕</button></div>`;
if(dayEvents.length){dayEvents.forEach((ev,i)=>{html+=`<div style="display:flex;align-items:center;gap:6px;padding:4px 6px;background:var(--g1);border-radius:4px;margin-bottom:3px;font-size:12px">${ev.alert?'🔔 ':''}<span style="flex:1">${esc(ev.title)}</span>${ev.time?`<span style="color:var(--tx4);font-size:10px">${ev.time}</span>`:''}<button style="color:var(--red);font-size:10px" onclick="rmCalEv(${ev.id})" aria-label="Delete">✕</button></div>`})}
html+=`<div style="margin-top:6px;display:flex;gap:4px"><input class="inp" id="calEvTitle" placeholder="event..." style="flex:1;font-size:12px" onkeydown="if(event.key==='Enter')addCalEv('${selDate}')"><input type="time" class="inp" id="calEvTime" style="width:90px;font-size:11px"><label style="display:flex;align-items:center;gap:3px;font-size:10px;color:var(--tx3);white-space:nowrap"><input type="checkbox" id="calEvAlert" style="accent-color:var(--accent)">🔔</label><button class="btn btn-a btn-s" onclick="addCalEv('${selDate}')">+</button></div>`;
html+=`</div>`}
// Quick-add panel always visible — shows today's date when no day is selected
if(!calSelDay){
const todayStr=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
html+=`<div style="margin-top:10px;padding:10px;background:var(--g2);border-radius:5px;border:1px solid var(--brd)"><div style="font-size:11px;color:var(--tx3);margin-bottom:4px">📌 Quick add for today — or click a date above to schedule</div><div style="display:flex;gap:4px"><input class="inp" id="calEvTitle" placeholder="event..." style="flex:1;font-size:12px" onkeydown="if(event.key==='Enter')addCalEv('${todayStr}')"><input type="time" class="inp" id="calEvTime" style="width:90px;font-size:11px"><label style="display:flex;align-items:center;gap:3px;font-size:10px;color:var(--tx3);white-space:nowrap"><input type="checkbox" id="calEvAlert" style="accent-color:var(--accent)">🔔</label><button class="btn btn-a btn-s" onclick="addCalEv('${todayStr}')">+</button></div></div>`}
el.innerHTML=html}
function calClickDay(d){calSelDay=calSelDay===d?null:d;rCal()}
function addCalEv(date){const title=document.getElementById('calEvTitle')?.value.trim();if(!title)return;const time=document.getElementById('calEvTime')?.value||'';const alert=document.getElementById('calEvAlert')?.checked||false;
S.calEvents.push({id:Date.now(),title,date,time,alert,type:'event'});save();rCal();
if(alert&&time){scheduleAlert(title,date,time)}}
// Quick add from the always-visible form at top of calendar
function quickAddCalEv(){
const title=document.getElementById('calQTitle')?.value.trim();
const date=document.getElementById('calQDate')?.value;
const time=document.getElementById('calQTime')?.value||'';
const alertOn=document.getElementById('calQAlert')?.checked||false;
if(!title||!date)return;
S.calEvents.push({id:Date.now(),title,date,time,alert:alertOn,type:'event'});
save();rCal();
if(alertOn&&time)scheduleAlert(title,date,time)}
function rmCalEv(id){S.calEvents=S.calEvents.filter(e=>e.id!==id);save();rCal()}
function scheduleAlert(title,date,time){
const target=new Date(date+'T'+time);const now=Date.now();const delay=target.getTime()-now;
if(delay>0&&delay<86400000*7){setTimeout(()=>{if(Notification.permission==='granted')new Notification('NEPT — '+title);else alert('🔔 NEPT: '+title)},delay)}
// Request notification permission on first use
if(Notification.permission==='default')Notification.requestPermission()}
// Check alerts on load
function checkAlerts(){if(!S.calEvents)return;const now=new Date();S.calEvents.forEach(ev=>{if(ev.alert&&ev.time){scheduleAlert(ev.title,ev.date,ev.time)}})}
// Google Calendar — public ICS URL approach
function promptGCal(){
const existing=S.gcalUrl||'';
const w=document.getElementById('b-calendar');if(!w)return;
const inp=document.createElement('div');inp.innerHTML=`<div style="margin-top:8px;padding:10px;background:var(--g2);border-radius:5px;border:1px solid var(--brd)"><div class="sl">Google Calendar</div><div style="font-size:10px;color:var(--tx3);margin-bottom:6px">Paste your public Google Calendar ICS URL.<br>In Google Calendar: Settings → Calendar → Integrate → Public URL to ICS</div><div style="display:flex;gap:4px"><input class="inp" id="gcalUrlIn" value="${esc(existing)}" placeholder="https://calendar.google.com/...ical" style="flex:1;font-size:11px"><button class="btn btn-a btn-s" onclick="importGCal()">Import</button></div></div>`;
w.appendChild(inp.firstElementChild)}
function importGCal(){const url=document.getElementById('gcalUrlIn')?.value.trim();if(!url)return;S.gcalUrl=url;save();
// Fetch and parse ICS (uses a CORS proxy for GitHub Pages)
const proxy='https://api.allorigins.win/raw?url=';
fetch(proxy+encodeURIComponent(url)).then(r=>r.text()).then(ics=>{parseICS(ics);rCal()}).catch(err=>{alert('Could not fetch calendar. Make sure the URL is public.');console.error(err)})}
function parseICS(text){
// Simple ICS parser — extracts VEVENT blocks
const events=text.split('BEGIN:VEVENT');events.shift();events.forEach(ev=>{
const get=k=>{const m=ev.match(new RegExp(k+':(.+)'));return m?m[1].trim():''};
const summary=get('SUMMARY');const dtstart=get('DTSTART');const dtend=get('DTEND');
if(!summary||!dtstart)return;
// Parse date (handles both 20250421 and 20250421T090000Z formats)
let dateStr='',timeStr='';
if(dtstart.length>=8){const y=dtstart.substr(0,4),m=dtstart.substr(4,2),d=dtstart.substr(6,2);dateStr=y+'-'+m+'-'+d;if(dtstart.length>=15){const hh=dtstart.substr(9,2),mm=dtstart.substr(11,2);timeStr=hh+':'+mm}}
// Avoid duplicates
if(S.calEvents.find(e=>e.title===summary&&e.date===dateStr))return;
S.calEvents.push({id:Date.now()+Math.random(),title:'📅 '+summary,date:dateStr,time:timeStr,alert:false,type:'gcal'})});save()}

// --- FLASHCARDS (with decks) ---
function rFC(){const el=document.getElementById('b-flashcards');if(!el)return;if(!S.decks)S.decks=['General'];if(!S.fcDeck)S.fcDeck='all';
const filtered=S.fcDeck==='all'?S.flashcards:S.flashcards.filter(c=>c.deck===S.fcDeck);const due=filtered.filter(c=>!c.due||c.due<=Date.now());
el.innerHTML=`<div style="display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap"><button class="btn btn-s ${S.fcDeck==='all'?'btn-a':''}" onclick="S.fcDeck='all';S.fcIdx=0;save();rFC()">All (${S.flashcards.length})</button>${S.decks.map(d=>`<button class="btn btn-s ${S.fcDeck===d?'btn-a':''}" onclick="S.fcDeck='${esc(d)}';S.fcIdx=0;save();rFC()">${esc(d)} (${S.flashcards.filter(c=>c.deck===d).length})</button>`).join('')}<button class="btn btn-s" onclick="showDI()">+ deck</button><span id="dIW" style="display:none"><input class="inp" id="dIN" placeholder="deck name..." style="width:120px;display:inline;font-size:11px" onkeydown="if(event.key==='Enter')confirmDI()"><button class="btn btn-s btn-a" onclick="confirmDI()">✓</button></span></div>
<div class="tab-bar"><button class="tab act" onclick="fcT(0,this)">Study (${due.length})</button><button class="tab" onclick="fcT(1,this)">All</button><button class="tab" onclick="fcT(2,this)">Add</button></div>
<div class="tc act">${!due.length?'<div style="text-align:center;padding:20px;color:var(--tx3)">✓ all caught up</div>':`<div class="fc" id="fcCard" onclick="this.classList.toggle('flip')"><div class="fc-in"><div class="fc-f fc-fr"><span class="fc-fl">Q · ${esc(due[S.fcIdx%due.length].deck||'General')}</span>${esc(due[S.fcIdx%due.length].q)}</div><div class="fc-f fc-bk"><span class="fc-fl">A</span>${esc(due[S.fcIdx%due.length].a)}</div></div></div><div style="text-align:center;font-size:12px;color:var(--tx4)">${(S.fcIdx%due.length)+1}/${due.length}</div><div class="fc-rate"><button class="fc-rb fc-ra" onclick="rateC(${due[S.fcIdx%due.length].id},0)">Again</button><button class="fc-rb fc-rh" onclick="rateC(${due[S.fcIdx%due.length].id},1)">Hard</button><button class="fc-rb fc-rg" onclick="rateC(${due[S.fcIdx%due.length].id},2)">Good</button><button class="fc-rb fc-re" onclick="rateC(${due[S.fcIdx%due.length].id},3)">Easy</button></div><div style="display:flex;justify-content:center;gap:4px;margin-top:6px"><button class="btn btn-s" onclick="S.fcIdx=Math.max(0,S.fcIdx-1);save();rFC()">←</button><button class="btn btn-s" onclick="S.flashcards.sort(()=>Math.random()-.5);S.fcIdx=0;save();rFC()">⟳</button><button class="btn btn-s" onclick="S.fcIdx++;save();rFC()">→</button></div>`}</div>
<div class="tc">${filtered.length?`<div class="fc-list">${filtered.map(f=>{const gi=S.flashcards.indexOf(f);return`<div class="fc-li"><span>${esc(f.q)}</span><span style="color:var(--tx4);font-size:9px;margin:0 4px">${esc(f.deck||'General')} · ${f.interval||1}d</span><button style="color:var(--red);font-size:11px" onclick="S.flashcards.splice(${gi},1);save();rFC()" aria-label="Delete">✕</button></div>`}).join('')}</div>${S.fcDeck!=='all'?`<button class="btn btn-d btn-s" style="margin-top:6px" onclick="if(confirm('Delete deck?')){S.flashcards.forEach(c=>{if(c.deck==='${esc(S.fcDeck)}')c.deck='General'});S.decks=S.decks.filter(d=>d!=='${esc(S.fcDeck)}');S.fcDeck='all';save();rFC()}">Delete deck</button>`:''}`:'<div style="color:var(--tx4);padding:10px">no cards</div>'}</div>
<div class="tc"><div style="display:flex;flex-direction:column;gap:6px"><input class="inp" id="fcQ" placeholder="question..." onkeydown="if(event.key==='Enter')document.getElementById('fcAn').focus()"><input class="inp" id="fcAn" placeholder="answer..." onkeydown="if(event.key==='Enter')addFC()"><select class="inp" id="fcDS" style="font-size:12px">${S.decks.map(d=>`<option value="${esc(d)}" ${d===S.fcDeck&&S.fcDeck!=='all'?'selected':''}>${esc(d)}</option>`).join('')}</select><button class="btn btn-a" onclick="addFC()">Add Card (Enter)</button><div class="sl">Import</div><button class="btn" onclick="document.getElementById('cardFileIn').click()">Import File</button><div class="sl">Export</div><button class="btn" onclick="exportDeck()">Export Current Deck (JSON)</button><div style="font-size:10px;color:var(--tx4)">JSON or CSV</div></div></div>`}
function fcT(i,btn){document.querySelectorAll('#b-flashcards .tab').forEach(t=>t.classList.remove('act'));btn.classList.add('act');document.querySelectorAll('#b-flashcards .tc').forEach((t,j)=>t.classList.toggle('act',j===i))}
function rateC(id,r){const c=S.flashcards.find(x=>x.id===id);if(!c)return;if(r===0){c.interval=1;c.ease=Math.max(1.3,c.ease-.2)}else if(r===1)c.interval=Math.max(1,Math.ceil(c.interval*1.2));else if(r===2){c.interval=Math.ceil(c.interval*c.ease);c.ease+=.05}else{c.interval=Math.ceil(c.interval*c.ease*1.3);c.ease+=.15}c.due=Date.now()+c.interval*86400000;S.fcIdx++;save();rFC()}
function addFC(){const q=document.getElementById('fcQ')?.value.trim(),a=document.getElementById('fcAn')?.value.trim();if(!q||!a)return;const dk=document.getElementById('fcDS')?.value||'General';S.flashcards.push({id:Date.now(),q,a,deck:dk,ease:2.5,interval:1,due:Date.now()});save();rFC()}
function showDI(){const w=document.getElementById('dIW');if(w){w.style.display='inline';document.getElementById('dIN')?.focus()}}
function confirmDI(){const inp=document.getElementById('dIN');const name=inp?.value.trim();if(!name)return;if(!S.decks.includes(name))S.decks.push(name);S.fcDeck=name;S.fcIdx=0;save();rFC()}
